  ogg_quality: 6
  backend: pretty-midi
  soundfont: /usr/share/sounds/sf2/FluidR3_GM.sf2
  sfizz:
    library_roots:
    - /data/audio-tools/sfz
    - /data/audio-tools
    fallback_backend: pretty-midi
postprocess:
  gain_db: 0.0
  highpass_hz: 35
  reverb_wet: 0.04
  reverb_decay_seconds: 1.1
  reverb_damping_hz: 6500
  stereo_width: 0.2
  compressor_threshold_db: -18.0
