  compressor_attack_ms: 10.0
  compressor_release_ms: 100.0
  compressor_makeup_db: 1.5
  compressor_knee_db: 6.0
  limiter_drive: 0.92
  normalize: true
  target_peak_db: -2.0
  eq_bands:
  - type: low_shelf
    hz: 90
    q: 0.8
    db: 1.0
  - type: peak
    hz: 320
