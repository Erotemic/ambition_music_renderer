schema: ambition.musicir.v1
id: violin_boss_relentless
title: Relentless Violin Boss r2 (Sonatina strings, remaster)
seed: 71429056
notes: 'Adaptive boss-battle cue in D minor with phrygian color (b2 = Eb) and C# leading
  tone for V7 pull. Violins are the foreground throughout: 1st violins carry the lead
  theme and virtuosic 16th-note runs; 2nd violins reinforce in unison or in close-position
  harmony; violas/celli/contrabass drive a chromatic-neighbor 8th-note ostinato underneath.
  Brass enters for stabs and a fanfare in the climax. Drums stay restrained in verse
  and bridge; the climax goes 4-on-the-floor with crash on phrase tops.'
tempo:
  bpm: 144
meter:
  beats_per_bar: 4
  beat_unit: 4
constraints:
  voice_leading: minimize_motion
  no_clusters: true
render:
