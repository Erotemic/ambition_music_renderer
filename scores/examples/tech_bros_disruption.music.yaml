  mallets:    {gain_db: 0.0,  lowpass_hz: 13000, high_shelf_hz: 5500, high_shelf_db: 0.4, transient_tame: 0.04, reverb_wet: 0.006}
  percussion: {gain_db: -1.0, lowpass_hz: 11500, high_shelf_hz: 5500, high_shelf_db: 0.0, transient_tame: 0.04, reverb_wet: 0.003}
