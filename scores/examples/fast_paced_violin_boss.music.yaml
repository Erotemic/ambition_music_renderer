schema: ambition.musicir.v1
id: fast_paced_violin_boss
title: Fast-Paced Violin Boss r2 (Sonatina strings, remaster)
seed: 20260507
notes: "D-minor boss cue at 176 BPM, 4/4. The solo violin carries the boss identity\
  \ \u2014 but unlike the previous version (which was pure 16th-note scalar runs end\
  \ to end), this cue gives the violin a real melodic theme with longer notes and\
  \ rests, then puts the fast 16th-note bursts in punctuation slots between phrases.\
  \ Six phases:\n\n  intro              (4 bars  / 5.5 s)  drone + distant brass call\n\
  \  phase1             (12 bars / 16.4 s) boss theme, sparse drums\n  phase2    \
  \         (12 bars / 16.4 s) theme + woodwind counter, brass joins\n  phase3   \
  \          (12 bars / 16.4 s) theme variation, virtuoso bursts\n  desperation_loop\
  \   (12 bars / 16.4 s) \"dying boss\" \u2014 slow held note + flailing\n  outro\
  \              (4 bars  / 5.5 s)  cadence to held Dm\n\nTotal: 56 bars = 76.4 s.\
  \ Uses the v0.8.0 renderer features: spec-level voice-leading + cluster constraints,\
  \ master bus compressor, per-section ambience overrides (intimate intro, cathedral\
  \ phase3, drier desperation loop, long-tail outro), per-template velocity humanization,\
  \ and a real pitch-bend curve on the held tonic of desperation_phrase."
tempo:
  bpm: 176
meter:
  beats_per_bar: 4
  beat_unit: 4
constraints:
  voice_leading: minimize_motion
  no_clusters: true
render:
