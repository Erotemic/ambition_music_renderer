  ogg_quality: 6
  backend: pretty-midi
  soundfont: /usr/share/sounds/sf2/FluidR3_GM.sf2
  sfizz:
    library_roots:
    - /data/audio-tools/sfz
    - /data/audio-tools
    fallback_backend: pretty-midi
postprocess:
  gain_db: 0.0
  highpass_hz: 34
  reverb_wet: 0.045
  reverb_decay_seconds: 1.1
  reverb_damping_hz: 6800
  stereo_width: 0.2
  compressor_threshold_db: -16.0
  compressor_ratio: 3.0
  compressor_attack_ms: 8.0
  compressor_release_ms: 80.0
  compressor_makeup_db: 2.0
  compressor_knee_db: 6.0
  limiter_drive: 0.92
  normalize: true
  target_peak_db: -2.0
  eq_bands:
