schema: ambition.musicir.v1
id: solo_soar
title: Solo Soar
seed: 20260506
notes: Southern-rock inspired ballad with distinct clean-pluck, dual rhythm-bed, slide, bass, drum, and lead-guitar stems. The cue develops the lead voice before the solo, supports every section with ringing rhythm guitars, and keeps early clean plucks audible for game-ready adaptive mixing.
tempo:
  bpm: 132
meter:
  beats_per_bar: 4
  beat_unit: 4
constraints:
  voice_leading: minimize_motion
  no_clusters: true
  min_pitch: 36
  max_pitch: 88
render:
  sample_rate: 48000
  ogg_quality: 6
  backend: fast
  soundfont: /usr/share/sounds/sf2/TimGM6mb.sf2
  adaptive_section_mastering:
    mode: global_master_slices
  runtime_stems:
    max_gain_db: 28.0
  sfizz:
    fallback_backend: pretty-midi
    library_roots:
    - /data/audio-tools/sfz
    - /data/audio-tools
    - ~/data/music/sfz
postprocess:
  gain_db: -1.8
  highpass_hz: 28
  reverb_wet: 0.058
  reverb_decay_seconds: 1.28
  reverb_damping_hz: 5000
  stereo_width: 0.095
  limiter_drive: 0.68
  normalize: true
  target_peak_db: -2.1
  target_lufs: -18.2
  true_peak_db: -2.0
  eq_bands:
  - type: peak
    hz: 4080
    q: 4.2
    db: -3.6
  - type: peak
    hz: 4550
    q: 7.5
    db: -2.8
  - type: peak
    hz: 5600
    q: 3.5
    db: -2.4
  - type: high_shelf
    hz: 7600
    q: 0.7
    db: -1.2
  - type: low_shelf
    hz: 115
    q: 0.8
    db: 0.7
  - type: peak
    hz: 850
    q: 0.8
    db: 0.5
  compressor_threshold_db: -19
  compressor_ratio: 1.55
  compressor_attack_ms: 28
  compressor_release_ms: 180
  compressor_makeup_db: 0.4
  effect_chain:
  - kind: pedalboard
    optional: true
    effects:
    - effect: compressor
      threshold_db: -20.0
      ratio: 1.55
      attack_ms: 28.0
      release_ms: 220.0
    - effect: reverb
      room_size: 0.18
      damping: 0.82
      wet_level: 0.018
      dry_level: 1.0
      width: 0.9
    - effect: limiter
      threshold_db: -2.0
      release_ms: 70.0
stem_postprocess:
  gain_db: 0.0
  highpass_hz: 32
  reverb_wet: 0.004
  reverb_decay_seconds: 0.32
  reverb_damping_hz: 5200
  stereo_width: 0.035
  limiter_drive: 0.65
  normalize: false
  target_peak_db: -3.2
