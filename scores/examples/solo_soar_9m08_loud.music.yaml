playback:
  mode: section_stem_matrix
  intro: intro
  loop_components: [verse_a, verse_b, prechorus, chorus_a, verse_c, chorus_b, 
      bridge, solo_a, solo_b, solo_c, solo_climax]
  outro: outro
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [strings, choir_pad]
    fade_stems: [mallets, brass, percussion, winds]

state_map:
  starting: {section: intro}
  contemplative: {preferred_section: verse_a, stems: {strings: 1.0, mallets: 
        0.85, choir_pad: 0.55, percussion: 0.40, brass: 0.0, winds: 0.0}}
  melodic_main: {preferred_section: chorus_a, stems: {strings: 1.0, mallets: 1.0,
      choir_pad: 0.75, percussion: 0.85, brass: 0.45, winds: 0.0}}
  reflective: {preferred_section: bridge, stems: {strings: 1.0, mallets: 0.65, 
        choir_pad: 0.85, percussion: 0.30, brass: 0.0, winds: 0.55}}
  soaring_solo: {preferred_section: solo_b, stems: {strings: 1.0, mallets: 1.0, 
        choir_pad: 0.75, percussion: 1.0, brass: 0.45, winds: 0.0}}
  full_bombast: {preferred_section: solo_climax, stems: {strings: 1.0, mallets: 
        1.0, choir_pad: 0.85, percussion: 1.0, brass: 0.65, winds: 0.55}}
  exiting: {transition: outro_at_next_valid_exit_bar, outro: outro}

sections:
- id: intro
  kind: intro
  label: clean guitar arpeggio + slide swells - drums fade in late
  bars: 8
  intensity: 0.55
  density: 0.35
  loopable: false
  harmony: ["D", "A/C#", "Bm", "G", "D", "A/C#", "Bm", "G"]
    # Per-section ambience: longer reverb, drier dry signal — feels like
    # the band is approaching the listener from a distance.
  postprocess:
    reverb_wet: 0.060
    reverb_decay_seconds: 1.50
    reverb_damping_hz: 7000
  layers:
  - expression_swell
  - {template: rhythm_arpeggio, density: 1.0, velocity: 64}
  - {template: bass_walk, velocity: 70}
  - {template: organ_pad, velocity: 56}
  - {template: string_backing, velocity: 50}
  - {template: warm_pad_layer, velocity: 32}
      # Single slide swell on bar 4 to anticipate the verse.
  - {template: slide_gesture, starts: [[3, 0.0], [6, 0.0]], velocity: 76}
  - drums_intro

- id: verse_a
  kind: loop_component
  label: verse 1 - call_phrase on overdrive lead
  bars: 16
  intensity: 0.68
  density: 0.50
  loopable: true
  valid_exit_local_bars: [4, 8, 12, 16]
  harmony: ["D", "F#m", "G", "D", "Bm", "A", "G", "A", "D", "F#m", "G", "D", "Em",
    "A", "G", "A"]
  layers:
  - expression_swell
  - guitar_vibrato
  - {template: call_voice, starts: [[0, 0.0], [8, 0.0]], velocity: 84}
  - {template: response_voice, starts: [[4, 0.0], [12, 0.0]], velocity: 86}
  - {template: rhythm_arpeggio, density: 1.0, velocity: 68}
  - {template: bass_walk, velocity: 76}
  - {template: organ_pad, velocity: 64}
  - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 60}
  - {template: string_backing, velocity: 52}
  - drums_verse
  - {template: warm_pad_layer, velocity: 32}

- id: verse_b
  kind: loop_component
  label: verse 2 - response_phrase opens, slide-guitar fills
  bars: 16
  intensity: 0.72
  density: 0.55
  loopable: true
  valid_exit_local_bars: [4, 8, 12, 16]
  harmony: ["D", "F#m", "Bm", "A", "G", "D", "G", "A", "D", "F#m", "Bm", "A", "G",
    "Em", "A", "A"]
  layers:
  - guitar_vibrato
  - {template: response_voice, starts: [[0, 0.0], [8, 0.0]], velocity: 88}
  - {template: call_voice, starts: [[4, 0.0], [12, 0.0]], velocity: 86}
  - {template: slide_gesture, starts: [[3, 0.0], [7, 0.0], [11, 0.0], [15, 0.0]],
    velocity: 80}
  - {template: rhythm_arpeggio, density: 1.0, velocity: 70}
  - {template: bass_walk, velocity: 78}
  - {template: organ_pad, velocity: 66}
  - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 62}
  - {template: string_backing, velocity: 54}
  - drums_verse
  - {template: warm_pad_layer, velocity: 34}

- id: prechorus
  kind: loop_component
  label: prechorus - lift into chorus
  bars: 8
  intensity: 0.80
  density: 0.65
  loopable: true
  valid_exit_local_bars: [4, 8]
  harmony: ["G", "A", "Bm", "A", "G", "A", "D", "A"]
  layers:
  - guitar_vibrato
  - {template: prechorus_voice, starts: [[0, 0.0]], velocity: 90}
  - {template: rhythm_arpeggio, density: 1.0, velocity: 76}
  - {template: bass_drive, velocity: 82}
  - {template: organ_stab, hits: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], 
      velocity: 80}
  - {template: organ_pad, velocity: 70}
  - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0]], velocity: 64}
  - {template: string_backing, velocity: 60}
  - drums_prechorus
  - {template: warm_pad_layer, velocity: 36}

- id: chorus_a
  kind: loop_component
  label: chorus 1 - chorus_anthem hook, full ensemble
  bars: 16
  intensity: 0.86
  density: 0.72
  loopable: true
  valid_exit_local_bars: [4, 8, 12, 16]
  harmony: ["D", "A", "Bm", "G", "D", "A", "Bm", "G", "D", "A", "Bm", "G", "G", "A",
    "D", "D"]
  postprocess:
    reverb_wet: 0.050
    reverb_decay_seconds: 1.30
  layers:
  - guitar_vibrato
  - {template: chorus_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 94}
  - {template: rhythm_arpeggio, density: 1.0, velocity: 78}
  - {template: bass_drive, velocity: 86}
  - {template: organ_stab, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 88}
  - {template: organ_pad, velocity: 72}
  - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 68}
  - {template: horn_pad, velocity: 60}
  - {template: string_backing, velocity: 60}
  - drums_chorus
  - {template: warm_pad_layer, velocity: 38}

- id: verse_c
  kind: loop_component
  label: verse 3 - call + response with slide accents
  bars: 16
  intensity: 0.74
  density: 0.58
  loopable: true
  valid_exit_local_bars: [4, 8, 12, 16]
  harmony: ["D", "F#m", "G", "Bm", "G", "D", "Em", "A", "D", "F#m", "G", "Bm", "G",
    "D", "A", "A"]
  layers:
  - guitar_vibrato
  - {template: call_voice, starts: [[0, 0.0]], velocity: 88}
  - {template: response_voice, starts: [[4, 0.0]], velocity: 90}
  - {template: call_voice, starts: [[8, 0.0]], velocity: 90}
  - {template: response_voice, starts: [[12, 0.0]], velocity: 92}
  - {template: slide_gesture, starts: [[2, 2.0], [6, 2.0], [10, 2.0], [14, 2.0]],
    velocity: 82}
  - {template: rhythm_arpeggio, density: 1.0, velocity: 72}
  - {template: bass_walk, velocity: 80}
  - {template: organ_pad, velocity: 68}
  - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 64}
  - {template: horn_pad, velocity: 50}
  - {template: string_backing, velocity: 56}
  - drums_verse
  - {template: warm_pad_layer, velocity: 36}

- id: chorus_b
  kind: loop_component
  label: chorus 2 - bigger, horn weight prominent
  bars: 16
  intensity: 0.90
  density: 0.78
  loopable: true
  valid_exit_local_bars: [4, 8, 12, 16]
  harmony: ["D", "A", "Bm", "G", "D", "A", "Bm", "G", "Em", "A", "D", "Bm", "G", "A",
    "D", "D"]
  postprocess:
    reverb_wet: 0.050
    reverb_decay_seconds: 1.30
  layers:
  - guitar_vibrato
  - {template: chorus_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 96}
  - {template: rhythm_arpeggio, density: 1.0, velocity: 80}
  - {template: bass_drive, velocity: 88}
  - {template: organ_stab, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 90}
  - {template: organ_pad, velocity: 74}
  - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 70}
  - {template: horn_pad, velocity: 64}
  - {template: string_backing, velocity: 62}
  - drums_chorus
  - {template: warm_pad_layer, velocity: 40}

- id: bridge
  kind: loop_component
  label: bridge - oboe + violin lyrical, drums pulled back
  bars: 16
  intensity: 0.62
  density: 0.45
  loopable: true
  valid_exit_local_bars: [4, 8, 12, 16]
  harmony: ["Bm", "G", "D", "A", "Em", "G", "D", "A", "Bm", "G", "D", "A", "Em", "A",
    "G", "A"]
    # Drier ambience for the bridge — feels intimate.
  postprocess:
    reverb_wet: 0.025
    reverb_decay_seconds: 0.80
  layers:
  - guitar_vibrato
  - {template: bridge_voice_oboe, starts: [[0, 0.0], [8, 0.0]], velocity: 80}
  - {template: bridge_voice_violin, starts: [[4, 0.0], [12, 0.0]], velocity: 76}
  - {template: slide_gesture, starts: [[2, 2.0], [6, 2.0], [10, 2.0], [14, 2.0]],
    velocity: 74}
  - {template: rhythm_arpeggio, density: 1.0, velocity: 64}
  - {template: bass_walk, velocity: 70}
  - {template: organ_pad, velocity: 76}
  - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], 
      velocity: 64}
  - {template: string_backing, velocity: 60}
  - drums_bridge
  - {template: warm_pad_layer, velocity: 44}

- id: solo_a
  kind: loop_component
  label: solo phase 1 - sparse, sustained, single voice
  bars: 24
  intensity: 0.76
  density: 0.6
  loopable: true
