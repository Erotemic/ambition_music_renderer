schema: ambition.musicir.v1
id: dinosaur_liberators_long
title: Dinosaur Liberators (Full Length) - Southern Rock Anthem
seed: 19770804
notes: >-
  Full-length 9:08 version of the southern-rock anthem. Same legally-distinct
  Freebird homage as the short version, expanded to the original's running
  time:
    intro (16) + verse_a (16) + verse_b (16) + chorus_a (16) + verse_c (16)
    + chorus_b (16) + transition (8) + solo_a (24) + solo_b (36) + solo_c (36)
    + solo_d (28) + solo_climax (16) + outro (8) = 252 bars
    @ 110 BPM 4/4 ~= 9 minutes 9 seconds.

  The 5-minute guitar solo is divided into four phases, each carrying
  its own lick variations so the listener never hits the same 32 bars twice:
    solo_a   - slow opening, mid-register pentatonic + slide guitar fills
    solo_b   - blues-flavored chromatic licks + descending runs
    solo_c   - higher register, bend-and-release gestures, organ stabs
    solo_climax_section - peak climactic licks, full ensemble
    solo_d   - sustained singing notes in a high register, lyrical
  Then the closing fanfare returns to G major before the outro tag.

  Six runtime stem groups remapped for a rock band:
    strings    -> bass + supporting string-ensemble pad
    winds      -> oboe color (used in solo_d for melodic relief)
    brass      -> single french horn (chorus + climax weight)
    mallets    -> rhythm/lead/solo guitars + slide + piano
    percussion -> rock drum kit
    choir_pad  -> Hammond drawbar organ + warm pad

tempo:
  bpm: 110
meter:
  beats_per_bar: 4
  beat_unit: 4

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi

postprocess:
  gain_db: 0.0
  highpass_hz: 35
  reverb_wet: 0.045
  reverb_decay_seconds: 1.20
  reverb_damping_hz: 6800
  stereo_width: 0.06
  limiter_drive: 0.94
  normalize: true
  target_peak_db: -2.0

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 35
  reverb_wet: 0.006
  reverb_decay_seconds: 0.50
  reverb_damping_hz: 6800
  stereo_width: 0.040
  limiter_drive: 0.92
  normalize: false
  target_peak_db: -3.0

instruments:
  - {name: bass,         group: strings,    program: fingered_bass,     volume: 96, pan: 64, expression: 100}
  - {name: string_pad,   group: strings,    program: string_ensemble_1, volume: 70, pan: 64, expression: 80, modulation: 4}

  - {name: horn,         group: brass,      program: french_horn,       volume: 76, pan: 60, expression: 84, modulation: 3}

  - {name: oboe,         group: winds,      program: oboe,              volume: 80, pan: 70, expression: 88, modulation: 5}

  - {name: rhythm_gtr,   group: mallets,    program: clean_guitar,      volume: 92, pan: 40, expression: 100, modulation: 0}
  - {name: lead_gtr,     group: mallets,    program: overdrive_guitar,  volume: 96, pan: 76, expression: 104, modulation: 64}
  - {name: solo_gtr,     group: mallets,    program: distortion_guitar, volume: 100, pan: 80, expression: 108, modulation: 80}
  - {name: slide_gtr,    group: mallets,    program: steel_guitar,      volume: 84, pan: 50, expression: 96, modulation: 0}
  - {name: piano,        group: mallets,    program: acoustic_grand_piano, volume: 80, pan: 60, expression: 90}

  - {name: organ,        group: choir_pad,  program: drawbar_organ,     volume: 84, pan: 64, expression: 92, modulation: 6}
  - {name: warm_pad,     group: choir_pad,  program: pad_warm,          volume: 56, pan: 64, expression: 72}

  - {name: kit,          group: percussion, is_drum: true,              volume: 100, pan: 64, expression: 108}

motifs:
  # Vocal-style phrases (3 of them for verse variation).
  # G4 D5 B4 A4 G4 - D5 C5 B4 A4 G4
  - id: vocal_phrase_a
    root: G4
    intervals: [0, 7, 4, 2, 0, 7, 5, 4, 2, 0]
    rhythm:    [0.5, 1.0, 0.5, 0.5, 1.5, 0.5, 0.5, 0.5, 0.5, 4.0]
    velocities: [0.86, 0.94, 0.92, 0.90, 0.88, 0.94, 0.96, 0.94, 0.92, 0.84]

  # B4 D5 E5 D5 B4 A4 G4 - B4 D5 G5 D5 B4 A4 G4
  - id: vocal_phrase_b
    root: G4
    intervals: [4, 7, 9, 7, 4, 2, 0, 4, 7, 12, 7, 4, 2, 0]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 1.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 4.5]
    velocities: [0.88, 0.92, 0.96, 0.94, 0.90, 0.88, 0.84, 0.92, 0.96, 1.00, 0.96, 0.92, 0.90, 0.86]

  # Third verse vocal — ascending arc, lands on E (the 6).
  # G4 A4 B4 D5 E5 D5 B4 G4 - A4 B4 D5 G5 F#5 E5 D5 B4
  - id: vocal_phrase_c
    root: G4
    intervals: [0, 2, 4, 7, 9, 7, 4, 0, 2, 4, 7, 12, 11, 9, 7, 4]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 1.0, 0.5, 0.5, 1.0, 0.5, 0.5, 0.5, 1.0, 0.5, 0.5, 0.5, 4.0]
    velocities: [0.86, 0.88, 0.92, 0.94, 0.96, 0.92, 0.88, 0.86, 0.88, 0.90, 0.94, 1.00, 0.96, 0.92, 0.90, 0.84]

  # Solo lick A — mid-register E pentatonic.
  - id: solo_lick_a
    root: E5
    intervals: [-5, -2, 0, 3, 0, -2, -5, -7, -9, -7, -5, -2, 0, -2, -5, -7]
    rhythm:    [0.25, 0.25, 0.5, 0.5, 0.25, 0.25, 0.25, 0.25, 0.5, 0.25, 0.25, 0.5, 0.5, 0.25, 0.25, 0.5]
    velocities: [0.88, 0.86, 0.94, 0.96, 0.92, 0.88, 0.84, 0.86, 0.86, 0.84, 0.88, 0.92, 0.96, 0.92, 0.88, 0.84]

  # Solo lick B — ascending pentatonic run.
  - id: solo_lick_b
    root: E5
    intervals: [-9, -7, -5, -2, 0, 3, 0, -2, 7, 5, 3, 0, -2, -5, -7, -9]
    rhythm:    [0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25]
    velocities: [0.86, 0.86, 0.88, 0.92, 0.94, 1.00, 0.94, 0.90, 0.96, 0.92, 0.96, 0.92, 0.90, 0.86, 0.84, 0.84]

  # Solo lick C — bluesy chromatic descent through b5.
  # B5 Bb5 A5 G5 F#5 G5 A5 B5 - D6 B5 A5 G5 E5 D5 B4 A4
  - id: solo_lick_c
    root: E5
    intervals: [7, 6, 5, 3, 2, 3, 5, 7, 10, 7, 5, 3, 0, -2, -5, -7]
    rhythm:    [0.25, 0.25, 0.25, 0.25, 0.5, 0.25, 0.25, 0.5, 0.5, 0.25, 0.25, 0.5, 0.5, 0.25, 0.25, 0.5]
    velocities: [0.94, 0.92, 0.90, 0.88, 0.86, 0.86, 0.88, 0.92, 0.96, 0.92, 0.90, 0.88, 0.86, 0.84, 0.84, 0.82]

  # Solo lick D — bend-and-release gesture in high register.
  # E6 G6 E6 D6 G6 E6 - F#6 G6 E6 D6 B5 A5 G5
  - id: solo_lick_d
    root: E5
    intervals: [12, 15, 12, 10, 15, 12, 14, 15, 12, 10, 7, 5, 3]
    rhythm:    [0.5, 0.5, 0.25, 0.25, 0.5, 0.5, 0.25, 0.25, 0.5, 0.5, 0.5, 0.5, 1.0]
    velocities: [0.96, 1.00, 0.94, 0.92, 0.96, 0.94, 0.90, 0.92, 0.94, 0.92, 0.90, 0.88, 0.84]

  # Solo lick E — slow singing lyrical phrase in solo's "rest" moments.
  # E5 G5 - long held - F#5 - long held - E5 D5 B4 - long held
  - id: solo_lick_e
    root: E5
    intervals: [0, 3, 2, 0, -2, -5, 0]
    rhythm:    [0.5, 1.5, 1.0, 1.0, 0.5, 0.5, 4.0]
    velocities: [0.84, 0.92, 0.86, 0.84, 0.82, 0.78, 0.74]

  # Solo climax lick.
  - id: solo_climax_lick
    root: E5
    intervals: [12, 15, 14, 12, 10, 7, 5, 7, 10, 12, 10, 7, 3, 0]
    rhythm:    [0.5, 0.25, 0.25, 0.5, 0.5, 0.5, 0.25, 0.25, 0.25, 0.25, 0.25, 0.5, 0.5, 4.0]
    velocities: [0.96, 0.92, 0.94, 0.96, 0.92, 0.90, 0.88, 0.90, 0.96, 1.00, 0.94, 0.90, 0.88, 0.86]

  # Slide lick (used between vocal phrases and as fills).
  - id: slide_lick
    root: E5
    intervals: [0, -2, 3, 0, -5, 0]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 1.5]
    velocities: [0.84, 0.80, 0.88, 0.84, 0.80, 0.74]

  # Bridge melody (oboe color in solo_d).
  - id: bridge_melody
    root: G4
    intervals: [7, 9, 7, 4, 0, 2, 4, 7]
    rhythm:    [1.0, 0.5, 0.5, 1.0, 1.0, 0.5, 0.5, 4.0]
    velocities: [0.86, 0.92, 0.90, 0.86, 0.84, 0.86, 0.88, 0.82]

  # Transition "time has come" anchor riff — guitar pulls everything forward.
  # G4 G4 G4 D5 - G4 G4 G4 D5 (driving 16th-pulse phrase)
  - id: transition_riff
    root: G4
    intervals: [0, 0, 0, 7, 0, 0, 0, 7, 0, 7, 5, 4, 2, 0, -1, 0]
    rhythm:    [0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 1.0]
    velocities: [0.92, 0.86, 0.92, 0.96, 0.92, 0.86, 0.92, 0.96, 0.94, 0.96, 0.94, 0.90, 0.88, 0.86, 0.84, 0.84]

layer_templates:
  expression_swell:
    kind: automation
    automation:
      - {group: mallets,   cc: expression, from: 80, to: 105, curve: smooth, points: 12}
      - {group: choir_pad, cc: expression, from: 70, to: 95,  curve: smooth, points: 12}
      - {group: strings,   cc: expression, from: 80, to: 100, curve: smooth, points: 12}

  guitar_vibrato_lfo:
    kind: automation
    automation:
      - {instruments: [lead_gtr, solo_gtr, slide_gtr], cc: modulation, curve: lfo, from: 0, to: 80, cycles: 12}

  freebird_arpeggio:
    kind: arpeggio
    instrument: rhythm_gtr
    octave: 3
    pattern: [0, 1, 2, 1, 0, 1, 2, 1]
    step: 0.5
    duration_beats: 0.40
    velocity: 70
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 2

  bass_walk:
    kind: bassline
    instrument: bass
    octave: 2
    velocity: 84
    articulation: tenuto
    humanize_ms: 2
    pattern:
      - [0, 0.0, 1.8]
      - [0, 2.0, 1.8]

  bass_drive:
    kind: bassline
    instrument: bass
    octave: 2
    velocity: 88
    articulation: marcato
    humanize_ms: 2
    pattern:
      - [0, 0.0, 0.45]
      - [0, 0.5, 0.45]
      - [0, 1.0, 0.45]
      - [0, 1.5, 0.45]
      - [0, 2.0, 0.45]
      - [0, 2.5, 0.45]
      - [0, 3.0, 0.45]
      - [0, 3.5, 0.45]

  vocal_a_voice:
    kind: motif
    instrument: lead_gtr
    motif: vocal_phrase_a
    velocity: 90
    articulation: tenuto
    instrument_pitch_scoop_cents: {lead_gtr: 8.0}
    humanize_ms: 6

  vocal_b_voice:
    kind: motif
    instrument: lead_gtr
    motif: vocal_phrase_b
    velocity: 90
    articulation: tenuto
    instrument_pitch_scoop_cents: {lead_gtr: 8.0}
    humanize_ms: 6

  vocal_c_voice:
    kind: motif
    instrument: lead_gtr
    motif: vocal_phrase_c
    velocity: 92
    articulation: tenuto
    instrument_pitch_scoop_cents: {lead_gtr: 8.0}
    humanize_ms: 6

  slide_fill:
    kind: motif
    instrument: slide_gtr
    motif: slide_lick
    velocity: 80
    articulation: legato
    instrument_pitch_scoop_cents: {slide_gtr: 24.0}
    humanize_ms: 5

  solo_a_voice:
    kind: motif
    instrument: solo_gtr
    motif: solo_lick_a
    velocity: 92
    articulation: tenuto
    instrument_pitch_scoop_cents: {solo_gtr: 12.0}
    humanize_ms: 4

  solo_b_voice:
    kind: motif
    instrument: solo_gtr
    motif: solo_lick_b
    velocity: 92
    articulation: tenuto
    instrument_pitch_scoop_cents: {solo_gtr: 12.0}
    humanize_ms: 4

  solo_c_voice:
    kind: motif
    instrument: solo_gtr
    motif: solo_lick_c
    velocity: 94
    articulation: tenuto
    instrument_pitch_scoop_cents: {solo_gtr: 14.0}
    humanize_ms: 4

  solo_d_voice:
    kind: motif
    instrument: solo_gtr
    motif: solo_lick_d
    velocity: 94
    articulation: tenuto
    instrument_pitch_scoop_cents: {solo_gtr: 16.0}
    humanize_ms: 4

  solo_e_voice:
    kind: motif
    instrument: solo_gtr
    motif: solo_lick_e
    velocity: 88
    articulation: legato
    instrument_pitch_scoop_cents: {solo_gtr: 18.0}
    humanize_ms: 6

  solo_climax_voice:
    kind: motif
    instrument: solo_gtr
    motif: solo_climax_lick
    velocity: 96
    articulation: tenuto
    instrument_pitch_scoop_cents: {solo_gtr: 18.0}
    humanize_ms: 4

  transition_riff_voice:
    kind: motif
    instruments: [lead_gtr, rhythm_gtr]
    motif: transition_riff
    velocity: 92
    articulation: marcato
    instrument_octave_offsets: {lead_gtr: 0, rhythm_gtr: 0}
    instrument_velocity_offsets: {lead_gtr: 0, rhythm_gtr: -8}
    humanize_ms: 3

  oboe_solo:
    kind: motif
    instrument: oboe
    motif: bridge_melody
    velocity: 78
    articulation: legato
    humanize_ms: 5

  organ_pad:
    kind: pad_chords
    instrument: organ
    octave: 3
    duration_beats: 4.0
    velocity: 70
    articulation: pad
    voicing: open
    humanize_ms: 4

  organ_stab:
    kind: chord_hits
    instrument: organ
    octave: 3
    velocity: 84
    duration_beats: 2.0
    articulation: marcato
    voicing: open
    humanize_ms: 2

  piano_voicing:
    kind: chord_hits
    instrument: piano
    octave: 4
    velocity: 70
    duration_beats: 4.0
    articulation: tenuto
    voicing: open
    humanize_ms: 3

  string_pad_backing:
    kind: pad_chords
    instrument: string_pad
    octave: 3
    duration_beats: 4.0
    velocity: 56
    articulation: pad
    voicing: open
    humanize_ms: 8

  warm_pad_layer:
    kind: pad_chords
    instrument: warm_pad
    octave: 3
    every_bars: 4
    duration_beats: 16.0
    velocity: 38
    articulation: pad
    voicing: wide
    humanize_ms: 0

  horn_pad:
    kind: pad_chords
    instrument: horn
    octave: 3
    duration_beats: 4.0
    velocity: 64
    articulation: legato
    voicing: closed
    humanize_ms: 6

  drums_intro:
    kind: drums
    instrument: kit
    humanize_ms: 1
    events:
      - {drum: kick,       beat: 0.0, velocity: 50, bars: [12, 13, 14, 15]}
      - {drum: snare,      beat: 2.0, velocity: 50, bars: [13, 14, 15]}
      - {drum: closed_hat, beats: [0.5, 1.5, 2.5, 3.5], velocity: 24, bars: [13, 14, 15]}

  drums_rock_basic:
    kind: drums
    instrument: kit
    humanize_ms: 1
    events:
      - {drum: kick,       beats: [0.0, 2.0],            velocity: 80}
      - {drum: snare,      beats: [1.0, 3.0],            velocity: 78}
      - {drum: closed_hat, beats: [0.5, 1.5, 2.5, 3.5],  velocity: 32}
      - {drum: ride,       beats: [0.0, 1.0, 2.0, 3.0],  velocity: 26, probability: 0.6}

  drums_rock_full:
    kind: drums
    instrument: kit
    humanize_ms: 1
    events:
      - {drum: kick,       beats: [0.0, 0.75, 2.0],       velocity: 86}
      - {drum: snare,      beats: [1.0, 3.0],             velocity: 82}
      - {drum: closed_hat, beats: [0.5, 1.5, 2.5],        velocity: 30}
      - {drum: open_hat,   beat: 3.5,                     velocity: 36}
      - {drum: ride,       beats: [0.0, 1.0, 2.0, 3.0],   velocity: 30}
      - {drum: crash,      beat: 0.0, velocity: 84, bars: [0, 4, 8, 12]}

  drums_solo:
    kind: drums
    instrument: kit
    humanize_ms: 1
    events:
      - {drum: kick,       beats: [0.0, 0.75, 2.0, 2.75], velocity: 88}
      - {drum: snare,      beats: [1.0, 3.0],             velocity: 86}
      - {drum: closed_hat, beats: [0.25, 0.75, 1.25, 1.75, 2.25, 2.75, 3.25, 3.75], velocity: 28}
      - {drum: ride,       beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5], velocity: 36}
      - {drum: crash,      beat: 0.0, velocity: 88, bars: [0, 4, 8, 12, 16, 20, 24, 28, 32]}
      - {drum: low_tom,    beat: 3.5, velocity: 56, probability: 0.6}

  drums_solo_lyrical:
    kind: drums
    instrument: kit
    humanize_ms: 1
    events:
      - {drum: kick,       beats: [0.0, 2.0],             velocity: 78}
      - {drum: snare,      beats: [1.0, 3.0],             velocity: 70}
      - {drum: ride,       beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5], velocity: 32}
      - {drum: crash,      beat: 0.0, velocity: 78, bars: [0, 8, 16]}

  # Heavy, four-bar fill at end of transition leading into solo.
  drums_transition:
    kind: drums
    instrument: kit
    humanize_ms: 1
    events:
      - {drum: kick,       beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5], velocity: 88}
      - {drum: snare,      beats: [1.0, 3.0],             velocity: 90}
      - {drum: closed_hat, beats: [0.25, 0.75, 1.25, 1.75, 2.25, 2.75, 3.25, 3.75], velocity: 28}
      - {drum: crash,      beat: 0.0, velocity: 92, bars: [0, 4]}
      - {drum: low_tom,    beats: [3.25, 3.5, 3.75], velocity: 70, bars: [7]}

playback:
  mode: section_stem_matrix
  intro: intro
  loop_components: [verse_a, verse_b, chorus_a, verse_c, chorus_b, transition, solo_a, solo_b, solo_c, solo_d, solo_climax_section]
  outro: outro
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [strings, choir_pad]
    fade_stems: [mallets, brass, percussion, winds]

state_map:
  starting: {section: intro}
  contemplative: {preferred_section: verse_a, stems: {strings: 1.0, mallets: 0.85, choir_pad: 0.65, percussion: 0.40, brass: 0.0, winds: 0.0}}
  energetic:     {preferred_section: chorus_a, stems: {strings: 1.0, mallets: 1.0, choir_pad: 0.75, percussion: 0.85, brass: 0.40, winds: 0.0}}
  soaring_solo:  {preferred_section: solo_b, stems: {strings: 1.0, mallets: 1.0, choir_pad: 0.75, percussion: 1.0, brass: 0.55, winds: 0.0}}
  full_bombast:  {preferred_section: solo_climax_section, stems: {strings: 1.0, mallets: 1.0, choir_pad: 0.85, percussion: 1.0, brass: 0.70, winds: 0.0}}
  exiting: {transition: outro_at_next_valid_exit_bar, outro: outro}

sections:
  - id: intro
    kind: intro
    label: extended classic intro - arpeggio with descending bass
    bars: 16
    intensity: 0.50
    density: 0.35
    loopable: false
    harmony: ["G", "Bm/F#", "F", "C/E", "G", "Bm/F#", "F", "C/E",
              "G", "Bm/F#", "F", "C/E", "G", "Bm/F#", "F", "C/E"]
    layers:
      - expression_swell
      - {template: freebird_arpeggio, density: 1.0, velocity: 70}
      - {template: bass_walk, velocity: 80}
      - {template: organ_pad, velocity: 60}
      - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 56}
      - {template: string_pad_backing, velocity: 48}
      - drums_intro
      - {template: warm_pad_layer, velocity: 32}

  - id: verse_a
    kind: loop_component
    label: verse 1 - vocal phrase A over classic progression
    bars: 16
    intensity: 0.70
    density: 0.55
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["G", "Bm/F#", "F", "C/E", "G", "Bm/F#", "F", "C/E",
              "G", "Bm/F#", "F", "C/E", "G", "D", "C", "D"]
    layers:
      - guitar_vibrato_lfo
      - {template: vocal_a_voice, starts: [[0, 0.0]], velocity: 88}
      - {template: vocal_b_voice, starts: [[4, 0.0]], velocity: 90}
      - {template: vocal_a_voice, starts: [[8, 0.0]], velocity: 92}
      - {template: slide_fill, starts: [[12, 0.0], [14, 0.0]], velocity: 80}
      - {template: freebird_arpeggio, density: 1.0, velocity: 70}
      - {template: bass_walk, velocity: 84}
      - {template: organ_pad, velocity: 70}
      - {template: piano_voicing, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 60}
      - {template: string_pad_backing, velocity: 56}
      - drums_rock_basic
      - {template: warm_pad_layer, velocity: 36}

  - id: verse_b
    kind: loop_component
    label: verse 2 - vocal phrase B as opener, slide fills
    bars: 16
    intensity: 0.72
    density: 0.58
    loopable: true
