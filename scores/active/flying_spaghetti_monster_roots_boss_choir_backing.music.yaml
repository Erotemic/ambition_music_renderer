schema: ambition.musicir.v1
id: flying_spaghetti_monster_roots_boss_choir_backing
title: One Noodle Rises - Rooted Low Gregorian Chorale r13 (FluidR3 remaster, fingered
  bass)
seed: 2026060412
notes: 'Revision r12: redesigns the monk choir away from common-tone suspension drones.
  The choir now follows each local A/D/E harmony with sustained root/fifth tones,
  compressing repeated tones into longer holds where possible and resolving phrase
  endings back to A/E. It keeps the r10/r11 renderer same-pitch-overlap safety while
  avoiding the unresolved B/A holds that felt detached. | r13: FluidR3 soundfont,
  chord-safe walking bass + A-Mixolydian leads, jRhodes e-piano (SFZ, GM fallback),
  boss group mix with measured per-group gains, master EQ polish; original GM fingered
  bass restored (tuned to -27 dBFS).'
tempo:
  bpm: 104
meter:
  beats_per_bar: 4
  beat_unit: 4
render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi
  sfizz:
    library_roots:
    - /data/audio-tools/sfz
    - /data/audio-tools
    fallback_backend: pretty-midi
  soundfont: /usr/share/sounds/sf2/FluidR3_GM.sf2
constraints:
  voice_leading: minimize_motion
  no_clusters: true
postprocess:
  gain_db: 0.35
  highpass_hz: 32
  lowpass_hz: 10600
  presence_low_hz: 1300
  presence_high_hz: 3900
  presence_db: 0.4
  reverb_wet: 0.082
  reverb_decay_seconds: 1.05
