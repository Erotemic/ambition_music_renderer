schema: ambition.musicir.v1
id: quarterly_earnings_call
title: Quarterly Earnings Call - The Spin
seed: 33180644
notes: >-
  Reworked away from the synthwave four-on-the-floor into a SWUNG funk groove at
  104 BPM (triplet swing: offbeats land at the 2/3 of each beat, in the hats,
  clav and bass). The form is ANTIPHONAL — a bright, confident CFO voice in A
  major trades phrases with a lower, skeptical analyst in F# minor, like a call
  where two people are describing the same numbers very differently. The drama is
  done with MODE and a deceptive cadence, not chromaticism: the "guidance" turn
  simply drops from A major to its relative F# minor instead of resolving, then
  the spin climbs back. Consonant throughout; the only spice is funk 7th/9th
  color.

  Stem groups:
    strings    -> warm pad + a syncopated funk synth-bass (pad_warm, pad_poly,
                  synth_bass_1)
    winds      -> the two voices: CFO (lead_saw, bright A major) and analyst
                  (lead_square, lower F# minor)
    brass      -> the horn-section stabs (synth_brass_1/2)
    mallets    -> a swung clavinet comp + fx_crystal "ka-ching"
    percussion -> swung funk kit
    choir_pad  -> boardroom air (pad_metallic + fx_atmosphere)
  Form: count_in -> report_a -> report_b -> the_question (the cracks) ->
  the_spin -> sign_off.

tempo:
  bpm: 104
meter:
  beats_per_bar: 4
  beat_unit: 4

constraints:
  voice_leading: minimize_motion
  no_clusters: true

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi

postprocess:
  gain_db: 0.0
  highpass_hz: 30
  reverb_wet: 0.034
  reverb_decay_seconds: 0.82
  reverb_damping_hz: 7200
  stereo_width: 0.08
  compressor_threshold_db: -18.0
  compressor_ratio: 3.0
  compressor_attack_ms: 12.0
  compressor_release_ms: 110.0
  compressor_makeup_db: 1.5
  compressor_knee_db: 6.0
  limiter_drive: 0.94
  normalize: true
  target_peak_db: -2.0

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 30
  reverb_wet: 0.005
  reverb_decay_seconds: 0.44
  reverb_damping_hz: 7200
  stereo_width: 0.05
  limiter_drive: 0.92
  normalize: false
  target_peak_db: -3.0

instruments:
  - {name: pad_warm,    group: strings,    program: pad_warm,      volume: 74, pan: 66, expression: 86, modulation: 4}
  - {name: pad_poly,    group: strings,    program: pad_poly,      volume: 68, pan: 54, expression: 82, modulation: 4}
  - {name: funk_bass,   group: strings,    program: synth_bass_1,  volume: 98, pan: 64, expression: 100}

  - {name: cfo_lead,    group: winds,      program: lead_saw,      volume: 92, pan: 70, expression: 100, modulation: 5}
  - {name: analyst_lead,group: winds,      program: lead_square,   volume: 84, pan: 50, expression: 94,  modulation: 4}

  - {name: horn_a,      group: brass,      program: synth_brass_1, volume: 92, pan: 72, expression: 102, modulation: 3}
  - {name: horn_b,      group: brass,      program: synth_brass_2, volume: 86, pan: 48, expression: 98,  modulation: 3}

  - {name: clav,        group: mallets,    program: clavinet,      volume: 82, pan: 58, expression: 94}
  - {name: kaching,     group: mallets,    program: fx_crystal,    volume: 68, pan: 82, expression: 82}

  - {name: pad_metallic,group: choir_pad,  program: pad_metallic,  volume: 56, pan: 64, expression: 76, modulation: 3}
  - {name: atmos,       group: choir_pad,  program: fx_atmosphere, volume: 50, pan: 64, expression: 72, modulation: 4}

  - {name: kit,         group: percussion, is_drum: true,          volume: 100, pan: 64, expression: 108}

motifs:
  # CFO — bright, confident A-major lick (1 bar). A4 C#5 E5 D5 C#5 A4
  - id: cfo_call
    root: A4
    intervals: [0, 4, 7, 5, 4, 0]
    rhythm:    [0.5, 0.5, 1.0, 0.5, 0.5, 1.0]
    velocities: [0.92, 0.86, 0.96, 0.84, 0.86, 0.90]

  # Analyst — lower, skeptical F# minor answer (1 bar). F#4 A4 G#4 F#4 E4 F#4
  - id: analyst_answer
    root: F#4
    intervals: [0, 3, 2, 0, -2, 0]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 1.0, 1.0]
    velocities: [0.84, 0.80, 0.82, 0.78, 0.76, 0.82]

  # The question — F# minor pressing line, modal and consonant (2 bars).
  # F#4 G#4 A4 B4 A4 G#4 F#4 C#4
  - id: the_question
    root: F#4
    intervals: [0, 2, 3, 5, 3, 2, 0, -5]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
    velocities: [0.86, 0.82, 0.84, 0.86, 0.80, 0.78, 0.82, 0.74]

  # The spin — defiant A-major recovery, reaches F#5 once (1.5 bars).
  # A4 C#5 E5 F#5 E5 C#5 A4 E4
  - id: the_spin
    root: A4
    intervals: [0, 4, 7, 9, 7, 4, 0, -5]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
    velocities: [0.92, 0.86, 0.94, 1.00, 0.90, 0.86, 0.90, 0.84]

layer_templates:
  expression_swell:
    kind: automation
    automation:
      - {group: winds,     cc: expression, from: 72, to: 106, curve: smooth, points: 14}
      - {group: brass,     cc: expression, from: 60, to: 106, curve: smooth, points: 14}
      - {group: strings,   cc: expression, from: 72, to: 100, curve: smooth, points: 14}
      - {group: mallets,   cc: expression, from: 70, to: 104, curve: smooth, points: 14}
      - {group: choir_pad, cc: expression, from: 50, to: 82,  curve: smooth, points: 10}

  # Syncopated, swung funk bass (offbeats at the 2/3 of the beat).
  funk_bass_line:
    kind: bassline
    instrument: funk_bass
    octave: 1
    velocity: 94
    articulation: marcato
    humanize_ms: 2
    humanize_velocity_pct: 4
    pattern:
      - [0, 0.0, 0.4]
      - [7, 0.66, 0.28]
      - [0, 1.0, 0.4]
      - [0, 1.66, 0.28]
      - [12, 2.0, 0.4]
      - [7, 2.66, 0.28]
      - [0, 3.0, 0.4]
      - [5, 3.66, 0.28]

  funk_bass_thin:
    kind: bassline
    instrument: funk_bass
    octave: 1
    velocity: 84
    articulation: marcato
    humanize_ms: 2
    humanize_velocity_pct: 4
    pattern:
      - [0, 0.0, 0.5]
      - [0, 1.66, 0.3]
      - [7, 2.0, 0.4]
      - [0, 3.66, 0.3]

  # Swung clavinet comp — long-short upbeats (ostinato rhythm 0.66/0.34).
  clav_comp:
    kind: ostinato
    instrument: clav
    octave: 4
    intervals: [0, 7, 0, 12]
    rhythm: [0.66, 0.34, 0.66, 0.34]
    velocity: 60
    articulation: staccato
    humanize_ms: 2
    humanize_velocity_pct: 4

  clav_comp_soft:
    kind: ostinato
    instrument: clav
    octave: 4
    intervals: [0, 7]
    rhythm: [0.66, 0.34]
    velocity: 50
    articulation: staccato
    humanize_ms: 2
    humanize_velocity_pct: 4

  warm_pad:
    kind: pad_chords
    instruments: [pad_warm, pad_poly]
    instrument_octave_offsets: {pad_warm: 0, pad_poly: 1}
    instrument_velocity_offsets: {pad_warm: 0, pad_poly: -8}
    octave: 3
    duration_beats: 4.0
    velocity: 62
    articulation: pad
    voicing: open
    humanize_ms: 4
    humanize_velocity_pct: 3

  cfo_voice:
    kind: motif
    instrument: cfo_lead
    motif: cfo_call
    velocity: 88
    articulation: tenuto
    humanize_ms: 3
    humanize_velocity_pct: 4

  analyst_voice:
    kind: motif
    instrument: analyst_lead
    motif: analyst_answer
    velocity: 80
    articulation: tenuto
    humanize_ms: 3
    humanize_velocity_pct: 4

  question_voice:
    kind: motif
    instrument: analyst_lead
    motif: the_question
    velocity: 82
    articulation: tenuto
    humanize_ms: 3
    humanize_velocity_pct: 4

  spin_voice:
    kind: motif
    instrument: cfo_lead
    motif: the_spin
    velocity: 92
    articulation: tenuto
    humanize_ms: 3
    humanize_velocity_pct: 4

  # Funk horn stabs.
  horn_stab:
    kind: chord_hits
    instruments: [horn_a, horn_b]
    instrument_octave_offsets: {horn_a: 0, horn_b: -1}
    octave: 3
    velocity: 86
    duration_beats: 0.4
    articulation: marcato
    voicing: closed
    humanize_ms: 2
    humanize_velocity_pct: 3

  horn_pad:
    kind: pad_chords
    instruments: [horn_a, horn_b]
    instrument_octave_offsets: {horn_a: 0, horn_b: -1}
    octave: 3
    duration_beats: 4.0
    velocity: 70
    articulation: legato
    voicing: closed
    humanize_ms: 3
    humanize_velocity_pct: 3

  kaching_sparkle:
    kind: chord_hits
    instrument: kaching
    octave: 5
    velocity: 70
    duration_beats: 3.0
    articulation: bell
    voicing: open
    humanize_ms: 0
    humanize_velocity_pct: 3

  metallic_wash:
    kind: pad_chords
    instrument: pad_metallic
    octave: 3
    every_bars: 4
    duration_beats: 16.0
    velocity: 46
    articulation: pad
    voicing: wide
    humanize_ms: 0
    humanize_velocity_pct: 3

  atmos_wash:
    kind: pad_chords
    instrument: atmos
    octave: 4
    every_bars: 4
    duration_beats: 16.0
    velocity: 40
    articulation: pad
    voicing: open
    humanize_ms: 0
    humanize_velocity_pct: 3

  # Swung funk kit — backbeat snare, swung hats, syncopated kick.
  drums_funk:
    kind: drums
    instrument: kit
    humanize_ms: 1
    humanize_velocity_pct: 4
    events:
      - {drum: kick,           beats: [0.0, 0.66, 2.0],                          velocity: 88}
      - {drum: electric_snare, beats: [1.0, 3.0],                                velocity: 82}
      - {drum: closed_hat,     beats: [0.0, 0.66, 1.0, 1.66, 2.0, 2.66, 3.0, 3.66], velocity: 30}
      - {drum: open_hat,       beats: [1.66, 3.66],                              velocity: 28}
      - {drum: hand_clap,      beats: [1.0, 3.0],                                velocity: 36}

  drums_funk_thin:
    kind: drums
    instrument: kit
    humanize_ms: 1
    humanize_velocity_pct: 4
    events:
      - {drum: kick,           beats: [0.0, 2.0],                                velocity: 70}
      - {drum: side_stick,     beats: [1.0, 3.0],                                velocity: 42}
      - {drum: closed_hat,     beats: [0.0, 0.66, 1.0, 1.66, 2.0, 2.66, 3.0, 3.66], velocity: 22}

  drums_funk_full:
    kind: drums
    instrument: kit
    humanize_ms: 1
    humanize_velocity_pct: 4
    events:
      - {drum: kick,           beats: [0.0, 0.66, 2.0, 2.66],                    velocity: 90}
      - {drum: electric_snare, beats: [1.0, 3.0],                                velocity: 86}
      - {drum: hand_clap,      beats: [1.0, 3.0],                                velocity: 50}
      - {drum: closed_hat,     beats: [0.0, 0.66, 1.0, 1.66, 2.0, 2.66, 3.0, 3.66], velocity: 34}
      - {drum: open_hat,       beats: [1.66, 3.66],                              velocity: 30}
      - {drum: tambourine,     beats: [0.66, 1.66, 2.66, 3.66],                  velocity: 24}
      - {drum: crash,          beat: 0.0, velocity: 82, bars: [0, 4]}

playback:
  mode: section_stem_matrix
  intro: count_in
  loop_components: [report_a, report_b, the_question_sec, the_spin_sec]
  outro: sign_off
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [strings, choir_pad]
    fade_stems: [winds, brass, mallets, percussion]

state_map:
  starting: {section: count_in}

  exploring:
    preferred_section: report_a
    stems: {strings: 1.0, mallets: 0.80, percussion: 0.70, winds: 0.60, brass: 0.40, choir_pad: 0.45}

  hacking:
    preferred_section: report_b
    stems: {strings: 1.0, mallets: 1.0, percussion: 0.85, winds: 0.80, brass: 0.65, choir_pad: 0.40}

  ambushed:
    preferred_section: the_question_sec
    stems: {strings: 1.0, mallets: 0.55, percussion: 0.45, winds: 0.70, brass: 0.0, choir_pad: 0.80}

  confrontation:
    preferred_section: the_spin_sec
    stems: {strings: 1.0, mallets: 1.0, percussion: 1.0, winds: 1.0, brass: 1.0, choir_pad: 0.45}

  retreating:
    transition: outro_at_next_valid_exit_bar
    outro: sign_off

sections:
  - id: count_in
    kind: intro
    label: the room settles - swung hats and a clav vamp
    bars: 4
    intensity: 0.54
    density: 0.48
    loopable: false
    harmony: ["Amaj7", "Amaj7", "D9", "E7"]
    layers:
      - expression_swell
      - {template: funk_bass_thin, velocity: 82}
      - {template: clav_comp_soft, velocity: 50}
      - {template: warm_pad, velocity: 56}
      - {template: metallic_wash, velocity: 42}
      - {template: atmos_wash, velocity: 36}
      - drums_funk_thin

  - id: report_a
    kind: loop_component
    label: the report - CFO calls, analyst answers
    bars: 8
    intensity: 0.74
    density: 0.68
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Amaj7", "Bm7", "D9", "E7", "Amaj7", "F#m7", "D9", "E7"]
    layers:
      - {template: cfo_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 88}
      - {template: analyst_voice, starts: [[1, 0.0], [3, 0.0], [5, 0.0], [7, 0.0]], velocity: 78}
      - {template: funk_bass_line, velocity: 92}
      - {template: clav_comp, velocity: 58}
      - {template: warm_pad, velocity: 58}
      - {template: horn_stab, hits: [[0, 0.0], [0, 2.66], [4, 0.0], [4, 2.66]], velocity: 80}
      - drums_funk
      - {template: metallic_wash, velocity: 44}
      - {template: atmos_wash, velocity: 38}

  - id: report_b
    kind: loop_component
    label: the report - more numbers, the horns lean in
    bars: 8
    intensity: 0.80
    density: 0.74
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Amaj7", "E7", "D9", "Amaj7", "Bm7", "E7", "D9", "E7"]
    layers:
      - {template: cfo_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 90}
      - {template: analyst_voice, starts: [[1, 0.0], [3, 0.0], [5, 0.0], [7, 0.0]], velocity: 80}
      - {template: funk_bass_line, velocity: 92}
      - {template: clav_comp, velocity: 60}
      - {template: warm_pad, velocity: 60}
      - {template: horn_stab, hits: [[0, 0.0], [2, 2.66], [4, 0.0], [6, 2.66]], velocity: 84}
      - drums_funk
      - {template: kaching_sparkle, hits: [[0, 0.0], [4, 0.0]], velocity: 64}
      - {template: metallic_wash, velocity: 46}
      - {template: atmos_wash, velocity: 38}

  - id: the_question_sec
    kind: loop_component
    label: the question - it drops to F# minor, the groove thins, the cracks
    bars: 8
    intensity: 0.58
    density: 0.46
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["F#m7", "Bm7", "D", "C#sus4", "F#m7", "Bm7", "D", "C#7"]
    postprocess:
      reverb_wet: 0.028
      reverb_decay_seconds: 0.72
    layers:
      - {template: question_voice, starts: [[0, 0.0], [4, 0.0]], velocity: 82}
      - {template: analyst_voice, starts: [[2, 0.0], [6, 0.0]], velocity: 72}
      - {template: funk_bass_thin, velocity: 80}
      - {template: clav_comp_soft, velocity: 50}
      - {template: warm_pad, velocity: 60}
      - drums_funk_thin
      - {template: metallic_wash, velocity: 60}
      - {template: atmos_wash, velocity: 52}

  - id: the_spin_sec
    kind: loop_component
    label: the spin - back to A major, defiant, full horns
    bars: 8
    intensity: 0.92
    density: 0.84
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Amaj7", "E7", "D9", "Amaj7", "Bm7", "E7", "D9", "Amaj7"]
    postprocess:
      reverb_wet: 0.040
      reverb_decay_seconds: 0.90
    layers:
      - {template: spin_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 92}
      - {template: cfo_voice, starts: [[1, 0.0], [5, 0.0]], velocity: 80}
      - {template: funk_bass_line, velocity: 94}
      - {template: clav_comp, velocity: 62}
      - {template: warm_pad, velocity: 62}
      - {template: horn_pad, velocity: 68}
      - {template: horn_stab, hits: [[0, 0.0], [0, 2.66], [2, 0.0], [4, 0.0], [4, 2.66], [6, 0.0]], velocity: 88}
      - drums_funk_full
      - {template: kaching_sparkle, hits: [[0, 0.0], [4, 0.0]], velocity: 70}
      - {template: metallic_wash, velocity: 46}
      - {template: atmos_wash, velocity: 38}

  - id: sign_off
    kind: outro
    label: this concludes the call - a slick button
    bars: 4
    intensity: 0.62
    density: 0.46
    loopable: false
    harmony: ["Amaj7", "D9", "E7", "Amaj7"]
    layers:
      - {template: spin_voice, starts: [[0, 0.0]], velocity: 88}
      - {template: funk_bass_line, velocity: 88}
      - {template: clav_comp, velocity: 56}
      - {template: warm_pad, velocity: 58}
      - kind: drums
        instrument: kit
        humanize_ms: 1
        events:
          - {drum: kick, beat: 0.0, velocity: 90, bars: [3]}
          - {drum: crash, beat: 0.0, velocity: 82, bars: [3]}
          - {drum: electric_snare, beats: [0.0, 0.66, 1.0, 1.66, 2.0, 2.66], velocity: 40, bars: [2]}
      - {template: horn_stab, hits: [[3, 0.0]], velocity: 88}
      - {template: kaching_sparkle, hits: [[3, 0.0]], velocity: 70}
      - {template: metallic_wash, velocity: 44}
      - {template: atmos_wash, velocity: 36}

group_postprocess:
  strings:    {gain_db: 0.0,  lowpass_hz: 13500, high_shelf_hz: 5400, high_shelf_db: 0.4, transient_tame: 0.04, reverb_wet: 0.005}
  winds:      {gain_db: 0.5,  lowpass_hz: 14000, high_shelf_hz: 5200, high_shelf_db: 0.8, presence_low_hz: 1500, presence_high_hz: 5400, presence_db: 0.9, transient_tame: 0.02, reverb_wet: 0.005}
  brass:      {gain_db: 0.5,  lowpass_hz: 12500, high_shelf_hz: 5400, high_shelf_db: 0.8, presence_low_hz: 1200, presence_high_hz: 5000, presence_db: 0.8, transient_tame: 0.03, reverb_wet: 0.005}
  mallets:    {gain_db: 0.0,  lowpass_hz: 13000, high_shelf_hz: 5400, high_shelf_db: 0.4, transient_tame: 0.04, reverb_wet: 0.006}
  percussion: {gain_db: -1.0, lowpass_hz: 11500, high_shelf_hz: 5400, high_shelf_db: 0.0, transient_tame: 0.04, reverb_wet: 0.003}
  choir_pad:  {gain_db: -2.0, lowpass_hz: 11000, high_shelf_hz: 5400, high_shelf_db: -0.2, transient_tame: 0.04, reverb_wet: 0.012}
