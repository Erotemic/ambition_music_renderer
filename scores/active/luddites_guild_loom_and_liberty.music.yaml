  ogg_quality: 5
  backend: fallback
constraints:
  voice_leading: minimize_motion
  no_clusters: true
postprocess:
  gain_db: -0.6
  highpass_hz: 30
  lowpass_hz: 9800
  presence_low_hz: 1500
  presence_high_hz: 3600
  presence_db: 0.3
  reverb_wet: 0.13
  reverb_decay_seconds: 1.25
  reverb_damping_hz: 5000
  stereo_width: 0.14
  compressor_threshold_db: -18.0
  compressor_ratio: 2.8
  compressor_attack_ms: 10.0
  compressor_release_ms: 110.0
  compressor_makeup_db: 1.0
  compressor_knee_db: 6.0
  limiter_drive: 0.98
  normalize: true
  target_peak_db: -7.0
