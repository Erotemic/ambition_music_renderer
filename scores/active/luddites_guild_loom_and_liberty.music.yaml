title: Loom and Liberty - Luddites Guild Theme
seed: 2026050919
notes: >-
  Luddites Guild faction loop. Historically sympathetic folk-industrial music:
  dulcimer loom ostinato, fiddle solidarity tune, hand-drum work pulse, and
  warm strings. The mood is craft, labor rights, and resistance to exploitation,
  not anti-intellectual caricature.
