schema: ambition.musicir.v1
id: the_algorithm_knows_youre_lonely
title: The Algorithm Knows You're Lonely - 3AM in the Server Farm
seed: 60451123
notes: >-
  A lullaby for a machine, in 6/8. B minor at a gentle lilt (beats_per_bar 3,
  felt as two dotted pulses per bar), warm maj7/add9 colors, nothing harsh. This
  is through-composed, not a loop matrix: it tells one small story —
  verse -> refrain -> verse -> lift -> coda — so the emotion unfolds instead of
  cycling. The lead stays low and patient in the alto register and reaches up to
  D5 exactly once, at "the lift". A music box (celesta + music_box) frames the
  whole thing, opening alone and closing alone, like a thought you can't put down.

  Stem groups (warm, spacious):
    strings    -> warm + halo pads, soft sub-bass (pad_warm, pad_halo, synth_bass_1)
    winds      -> the lonely voice + a soft round lead (lead_voice, lead_calliope)
    brass      -> distant warm swells only (synth_brass, never stabs)
    mallets    -> the music box: music_box arp + celesta twinkle
    percussion -> soft 6/8 lofi: muffled kick on the dotted pulses, rimshot, shaker
    choir_pad  -> the empty room (pad_choir + fx_atmosphere)

tempo:
  bpm: 116
meter:
  beats_per_bar: 3
  beat_unit: 8

constraints:
  voice_leading: minimize_motion
  no_clusters: true

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi

postprocess:
  gain_db: 0.0
  highpass_hz: 28
  reverb_wet: 0.078
  reverb_decay_seconds: 1.90
  reverb_damping_hz: 5200
  stereo_width: 0.12
  compressor_threshold_db: -20.0
  compressor_ratio: 2.4
  compressor_attack_ms: 18.0
  compressor_release_ms: 160.0
  compressor_makeup_db: 1.2
  compressor_knee_db: 8.0
  limiter_drive: 0.90
  normalize: true
  target_peak_db: -2.5

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 28
  reverb_wet: 0.012
  reverb_decay_seconds: 0.85
  reverb_damping_hz: 5200
  stereo_width: 0.06
  limiter_drive: 0.90
  normalize: false
  target_peak_db: -3.0

instruments:
  - {name: pad_warm,    group: strings,    program: pad_warm,         volume: 80, pan: 60, expression: 90, modulation: 5}
  - {name: pad_halo,    group: strings,    program: pad_halo,         volume: 70, pan: 72, expression: 84, modulation: 5}
  - {name: sub_bass,    group: strings,    program: synth_bass_1,     volume: 84, pan: 64, expression: 92}

  - {name: lead_voice,  group: winds,      program: lead_voice,       volume: 84, pan: 60, expression: 92, modulation: 6}
  - {name: lead_soft,   group: winds,      program: lead_calliope,    volume: 74, pan: 70, expression: 86, modulation: 5}

  - {name: brass_swell_a, group: brass,    program: synth_brass_1,    volume: 68, pan: 70, expression: 82, modulation: 4}
  - {name: brass_swell_b, group: brass,    program: synth_brass_2,    volume: 62, pan: 52, expression: 78, modulation: 4}

  - {name: box,         group: mallets,    program: music_box,        volume: 76, pan: 56, expression: 88}
  - {name: twinkle,     group: mallets,    program: celesta,          volume: 62, pan: 80, expression: 80}

  - {name: pad_choir,   group: choir_pad,  program: pad_choir,        volume: 66, pan: 64, expression: 82, modulation: 4}
  - {name: atmos,       group: choir_pad,  program: fx_atmosphere,    volume: 54, pan: 64, expression: 74, modulation: 5}

  - {name: kit,         group: percussion, is_drum: true,             volume: 90, pan: 64, expression: 98}

motifs:
  # The lonely sigh — two dotted-pulse phrase over 2 bars (6 beats). B3..F#4.
  # F#4 E4 D4 | C#4 D4 B3
  - id: lonely_sigh
    root: F#4
    intervals: [0, -2, -4, -5, -4, -7]
    rhythm:    [1.5, 1.0, 0.5, 1.5, 0.5, 1.0]
    velocities: [0.78, 0.72, 0.70, 0.74, 0.70, 0.66]

  # The refrain — a warm gentle rise, tops at A4. Over 2 bars.
  # D4 E4 F#4 | A4 F#4 E4
  - id: refrain
    root: D4
    intervals: [0, 2, 4, 7, 4, 2]
    rhythm:    [1.5, 0.5, 1.0, 1.5, 0.5, 1.0]
    velocities: [0.76, 0.80, 0.82, 0.86, 0.78, 0.74]

  # The lift — the single reach to D5, the one note that means it. Over 2 bars.
  # F#4 A4 B4 | D5 B4 A4
  - id: the_lift
    root: F#4
    intervals: [0, 3, 5, 8, 5, 3]
    rhythm:    [1.5, 1.0, 0.5, 1.5, 0.5, 1.0]
    velocities: [0.80, 0.84, 0.86, 0.92, 0.82, 0.78]

  # Soft bass — root then fifth, one per dotted pulse (1.5 + 1.5 = 1 bar).
  - id: bass_patient
    root: B1
    intervals: [0, 7]
    rhythm:    [1.5, 1.5]
    velocities: [0.82, 0.74]

layer_templates:
  expression_swell:
    kind: automation
    automation:
      - {group: winds,     cc: expression, from: 64, to: 94, curve: smooth, points: 14}
      - {group: brass,     cc: expression, from: 50, to: 82, curve: smooth, points: 14}
      - {group: strings,   cc: expression, from: 66, to: 94, curve: smooth, points: 14}
      - {group: mallets,   cc: expression, from: 62, to: 90, curve: smooth, points: 14}
      - {group: choir_pad, cc: expression, from: 56, to: 86, curve: smooth, points: 10}

  bass_voice:
    kind: motif
    instrument: sub_bass
    motif: bass_patient
    velocity: 80
    articulation: legato
    humanize_ms: 4
    humanize_velocity_pct: 3
    starts: [[0, 0.0]]
    repeats: 24
    every_bars: 1

  # The music box — a gentle rolling 6/8 arpeggio (6 eighths per bar).
  box_arp:
    kind: arpeggio
    instrument: box
    octave: 4
    pattern: [0, 1, 2, 3, 2, 1]
    step: 0.5
    duration_beats: 0.55
    velocity: 60
    density: 1.0
    voicing: open
    articulation: normal
    humanize_ms: 5
    humanize_velocity_pct: 4

  box_arp_sparse:
    kind: arpeggio
    instrument: box
    octave: 4
    pattern: [0, 2, 1]
    step: 1.0
    duration_beats: 1.1
    velocity: 54
    density: 0.9
    voicing: open
    articulation: normal
    humanize_ms: 6
    humanize_velocity_pct: 4

  warm_pad:
    kind: pad_chords
    instruments: [pad_warm, pad_halo]
    instrument_octave_offsets: {pad_warm: 0, pad_halo: 1}
    instrument_velocity_offsets: {pad_warm: 0, pad_halo: -10}
    octave: 3
    duration_beats: 3.0
    velocity: 64
    articulation: pad
    voicing: open
    humanize_ms: 6
    humanize_velocity_pct: 3

  lonely_voice:
    kind: motif
    instrument: lead_voice
    motif: lonely_sigh
    velocity: 74
    articulation: legato
    humanize_ms: 5
    humanize_velocity_pct: 4

  refrain_voice:
    kind: motif
    instrument: lead_soft
    motif: refrain
    velocity: 76
    articulation: legato
    humanize_ms: 5
    humanize_velocity_pct: 4

  lift_voice:
    kind: motif
    instrument: lead_voice
    motif: the_lift
    velocity: 80
    articulation: legato
    humanize_ms: 5
    humanize_velocity_pct: 4

  brass_swell:
    kind: pad_chords
    instruments: [brass_swell_a, brass_swell_b]
    instrument_octave_offsets: {brass_swell_a: 0, brass_swell_b: -1}
    octave: 3
    every_bars: 2
    duration_beats: 6.0
    velocity: 54
    articulation: legato
    voicing: open
    humanize_ms: 6
    humanize_velocity_pct: 3

  twinkle_drops:
    kind: chord_hits
    instrument: twinkle
    octave: 5
    velocity: 56
    duration_beats: 2.5
    articulation: bell
    voicing: open
    humanize_ms: 2
    humanize_velocity_pct: 4

  choir_wash:
    kind: pad_chords
    instrument: pad_choir
    octave: 4
    every_bars: 4
    duration_beats: 12.0
    velocity: 58
    articulation: pad
    voicing: open
    humanize_ms: 0
    humanize_velocity_pct: 3

  atmos_wash:
    kind: pad_chords
    instrument: atmos
    octave: 4
    every_bars: 4
    duration_beats: 12.0
    velocity: 46
    articulation: pad
    voicing: wide
    humanize_ms: 0
    humanize_velocity_pct: 3

  # Soft 6/8 lofi — muffled kick on the two dotted pulses, rimshot, shaker.
  drums_lofi_soft:
    kind: drums
    instrument: kit
    humanize_ms: 6
    humanize_velocity_pct: 5
    events:
      - {drum: kick,       beats: [0.0, 1.5],            velocity: 62}
      - {drum: side_stick, beat: 1.5,                    velocity: 42}
      - {drum: shaker,     beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5], velocity: 24}

  drums_lofi_warm:
    kind: drums
    instrument: kit
    humanize_ms: 6
    humanize_velocity_pct: 5
    events:
      - {drum: kick,       beats: [0.0, 1.5],            velocity: 66}
      - {drum: side_stick, beat: 1.5,                    velocity: 44}
      - {drum: closed_hat, beats: [0.5, 1.0, 2.0, 2.5],  velocity: 20}
      - {drum: shaker,     beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5], velocity: 26}
      - {drum: tambourine, beat: 0.0,                    velocity: 24, probability: 0.4}

playback:
  mode: section_stem_matrix
  intro: opening
  loop_components: [verse_a, refrain_sec, verse_b, lift_sec]
  outro: coda
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 6
    bridge_stems: [strings, choir_pad]
    fade_stems: [winds, brass, mallets, percussion]

state_map:
  starting: {section: opening}

  exploring:
    preferred_section: verse_a
    stems: {strings: 1.0, mallets: 0.75, percussion: 0.45, winds: 0.60, brass: 0.0, choir_pad: 0.75}

  hacking:
    preferred_section: refrain_sec
    stems: {strings: 1.0, mallets: 0.85, percussion: 0.60, winds: 0.75, brass: 0.30, choir_pad: 0.70}

  ambushed:
    preferred_section: verse_b
    stems: {strings: 1.0, mallets: 0.55, percussion: 0.25, winds: 0.60, brass: 0.0, choir_pad: 0.95}

  confrontation:
    preferred_section: lift_sec
    stems: {strings: 1.0, mallets: 0.90, percussion: 0.70, winds: 0.95, brass: 0.55, choir_pad: 0.70}

  retreating:
    transition: outro_at_next_valid_exit_bar
    outro: coda

sections:
  - id: opening
    kind: intro
    label: the box opens - a single figure, alone
    bars: 4
    intensity: 0.40
    density: 0.30
    loopable: false
    harmony: ["Bm9", "Gmaj7", "Dadd9", "F#m7"]
    postprocess:
      reverb_wet: 0.092
      reverb_decay_seconds: 2.30
    layers:
      - expression_swell
      - {template: box_arp_sparse, density: 0.9, velocity: 54}
      - {template: warm_pad, velocity: 58}
      - {template: bass_voice, repeats: 4, velocity: 70}
      - {template: choir_wash, velocity: 50}
      - {template: atmos_wash, velocity: 40}
      - {template: twinkle_drops, hits: [[1, 0.0], [3, 0.0]], velocity: 50}

  - id: verse_a
    kind: loop_component
    label: verse - the lonely sigh
    bars: 8
    intensity: 0.56
    density: 0.48
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Bm9", "Gmaj7", "Dadd9", "A", "Bm9", "Em7", "Gmaj7", "F#m7"]
    layers:
      - {template: lonely_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 74}
      - {template: box_arp, density: 1.0, velocity: 58}
      - {template: warm_pad, velocity: 62}
      - {template: bass_voice, repeats: 8, velocity: 74}
      - drums_lofi_soft
      - {template: choir_wash, velocity: 54}
      - {template: atmos_wash, velocity: 44}
      - {template: twinkle_drops, hits: [[3, 0.0]], velocity: 50}

  - id: refrain_sec
    kind: loop_component
    label: refrain - someone connects, the warmth turns toward D major
    bars: 8
    intensity: 0.64
    density: 0.56
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["D", "A", "Bm7", "Gmaj7", "D", "G6", "A", "F#m7"]
    layers:
      - {template: refrain_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 78}
      - {template: lonely_voice, starts: [[2, 0.0], [6, 0.0]], velocity: 64}
      - {template: box_arp, density: 1.0, velocity: 60}
      - {template: warm_pad, velocity: 64}
      - {template: bass_voice, repeats: 8, velocity: 76}
      - {template: brass_swell, velocity: 52}
      - drums_lofi_warm
      - {template: choir_wash, velocity: 54}
      - {template: atmos_wash, velocity: 42}
      - {template: twinkle_drops, hits: [[0, 0.0], [4, 0.0]], velocity: 56}

  - id: verse_b
    kind: loop_component
    label: verse - the ache, the box almost alone again
    bars: 8
    intensity: 0.50
    density: 0.40
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Bm9", "Gmaj7", "Em7", "A", "Bm9", "Em7", "F#m7", "F#m7"]
    postprocess:
      reverb_wet: 0.098
      reverb_decay_seconds: 2.40
    layers:
      - {template: lonely_voice, starts: [[0, 0.0], [4, 0.0]], velocity: 72}
      - {template: box_arp_sparse, density: 0.9, velocity: 56}
      - {template: warm_pad, velocity: 62}
      - {template: bass_voice, repeats: 8, velocity: 72}
      - kind: drums
        instrument: kit
        humanize_ms: 6
        events:
          - {drum: kick, beat: 0.0, velocity: 56}
          - {drum: side_stick, beat: 1.5, velocity: 38}
          - {drum: shaker, beats: [0.5, 2.5], velocity: 20}
      - {template: choir_wash, velocity: 68}
      - {template: atmos_wash, velocity: 56}

  - id: lift_sec
    kind: loop_component
    label: the lift - it reaches out, the one high note
    bars: 8
    intensity: 0.74
    density: 0.64
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["G6", "D", "Em7", "A", "Bm9", "Gmaj7", "A", "F#m7"]
    postprocess:
      reverb_wet: 0.086
      reverb_decay_seconds: 2.10
    layers:
      - {template: lift_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 82}
      - {template: refrain_voice, starts: [[1, 0.0], [5, 0.0]], velocity: 70}
      - {template: box_arp, density: 1.0, velocity: 62}
      - {template: warm_pad, velocity: 66}
      - {template: bass_voice, repeats: 8, velocity: 78}
      - {template: brass_swell, velocity: 58}
      - drums_lofi_warm
      - {template: choir_wash, velocity: 58}
      - {template: atmos_wash, velocity: 44}
      - {template: twinkle_drops, hits: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 58}

  - id: coda
    kind: outro
    label: the box closes - one warm chord left, then sleep
    bars: 4
    intensity: 0.44
    density: 0.30
    loopable: false
    harmony: ["Em7", "Gmaj7", "A", "Bm9"]
    layers:
      - {template: lonely_voice, starts: [[0, 0.0]], velocity: 70}
      - {template: box_arp_sparse, density: 0.8, velocity: 52}
      - {template: warm_pad, velocity: 60}
      - {template: bass_voice, repeats: 4, velocity: 72}
      - {template: choir_wash, velocity: 52}
      - {template: atmos_wash, velocity: 42}
      - {template: twinkle_drops, hits: [[3, 0.0]], velocity: 54}

group_postprocess:
  strings:    {gain_db: 0.0,  lowpass_hz: 11000, high_shelf_hz: 4600, high_shelf_db: -0.4, transient_tame: 0.06, reverb_wet: 0.010}
  winds:      {gain_db: 0.5,  lowpass_hz: 10500, high_shelf_hz: 4400, high_shelf_db: -0.2, presence_low_hz: 1200, presence_high_hz: 4200, presence_db: 0.6, transient_tame: 0.05, reverb_wet: 0.012}
  brass:      {gain_db: -1.0, lowpass_hz: 9500,  high_shelf_hz: 4400, high_shelf_db: -0.6, transient_tame: 0.07, reverb_wet: 0.012}
  mallets:    {gain_db: -0.5, lowpass_hz: 11500, high_shelf_hz: 4800, high_shelf_db: -0.2, transient_tame: 0.05, reverb_wet: 0.011}
  percussion: {gain_db: -1.5, lowpass_hz: 9000,  high_shelf_hz: 4400, high_shelf_db: -0.6, transient_tame: 0.06, reverb_wet: 0.006}
  choir_pad:  {gain_db: -1.5, lowpass_hz: 10000, high_shelf_hz: 4600, high_shelf_db: -0.4, transient_tame: 0.06, reverb_wet: 0.018}
