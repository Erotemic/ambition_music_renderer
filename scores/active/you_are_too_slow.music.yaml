schema: ambition.musicir.v1
id: you_are_too_slow
title: You Are Too Slow
seed: 2026070602
notes: >-
  Fast, bright, loop-first level music for the Sanic sandbox.  This revision is
  built as one seamless loop instead of launch/loop/outro sections: square and
  saw leads drive the route, ring accents sparkle at phrase turns, spring hits
  punctuate the back half, and the bass stays on root/fifth/octave motion so the
  stems combine cleanly.

tempo:
  bpm: 174
meter:
  beats_per_bar: 4
  beat_unit: 4

constraints:
  voice_leading: minimize_motion
  no_clusters: true

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi
  runtime_stems:
    max_gain_db: 18.0

postprocess:
  gain_db: -0.7
  highpass_hz: 34
  lowpass_hz: 13200
  presence_low_hz: 1800
  presence_high_hz: 6200
  presence_db: 0.8
  reverb_wet: 0.020
  reverb_decay_seconds: 0.42
  reverb_damping_hz: 7600
  stereo_width: 0.07
  compressor_threshold_db: -17.5
  compressor_ratio: 2.5
  compressor_attack_ms: 6.0
  compressor_release_ms: 78.0
  compressor_makeup_db: 0.9
  compressor_knee_db: 4.5
  limiter_drive: 0.90
  normalize: true
  target_peak_db: -2.0

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 34
  reverb_wet: 0.002
  reverb_decay_seconds: 0.18
  reverb_damping_hz: 7600
  stereo_width: 0.030
  limiter_drive: 0.88
  normalize: false
  target_peak_db: -3.0

instruments:
  - {name: square_dash,    group: lead,       program: lead_square,     volume: 92, pan: 72, expression: 100, modulation: 1}
  - {name: saw_edge,       group: lead,       program: lead_saw,        volume: 72, pan: 54, expression: 84, modulation: 1}
  - {name: calliope_taunt, group: lead,       program: lead_calliope,   volume: 54, pan: 88, expression: 76, modulation: 1}
  - {name: bass_drive,     group: bass,       program: synth_bass_1,    volume: 84, pan: 48, expression: 94}
  - {name: rubber_bass,    group: bass,       program: slap_bass_1,     volume: 54, pan: 58, expression: 74}
  - {name: ring_bell,      group: rings,      program: celesta,         volume: 78, pan: 82, expression: 86}
  - {name: ring_sparkle,   group: rings,      program: fx_crystal,      volume: 58, pan: 94, expression: 70}
  - {name: spring_brass,   group: springs,    program: synth_brass_1,   volume: 88, pan: 44, expression: 92}
  - {name: spring_echo,    group: springs,    program: lead_fifths,     volume: 60, pan: 76, expression: 72}
  - {name: speed_kit,      group: percussion, is_drum: true,            volume: 80, pan: 64, expression: 92}

motifs:
  - id: dash_hook
    root: E5
    intervals: [0, 4, 7, 9, 12, 9, 7, 4, 5, 7, 4, 2, 0]
    rhythm:    [0.25, 0.25, 0.25, 0.25, 0.50, 0.25, 0.25, 0.50, 0.25, 0.25, 0.50, 0.50, 0.50]
    velocities: [0.92, 0.74, 0.82, 0.88, 1.00, 0.78, 0.82, 0.84, 0.78, 0.90, 0.76, 0.70, 0.86]

  - id: taunt_reply
    root: B4
    intervals: [0, 3, 5, 7, 5, 3, 0, -2, 0, 5, 7, 12]
    rhythm:    [0.25, 0.25, 0.50, 0.50, 0.25, 0.25, 0.50, 0.50, 0.25, 0.25, 0.50, 0.75]
    velocities: [0.76, 0.86, 0.72, 0.84, 0.68, 0.76, 0.80, 0.62, 0.74, 0.88, 0.90, 1.00]

  - id: sparkle_turn
    root: E6
    intervals: [0, 7, 12, 7, 14, 12, 7, 4]
    rhythm:    [0.125, 0.125, 0.18, 0.18, 0.125, 0.125, 0.18, 0.28]
    velocities: [0.80, 0.70, 0.92, 0.62, 0.76, 0.88, 0.58, 0.44]

layer_templates:
  bass_momentum:
    kind: bassline
    instrument: bass_drive
    octave: 2
    pattern: [[0, 0.0, 0.28], [0, 0.5, 0.18], [12, 0.75, 0.18], [7, 1.0, 0.28], [0, 1.5, 0.28], [12, 2.0, 0.18], [7, 2.25, 0.18], [12, 2.5, 0.28], [7, 3.0, 0.28], [12, 3.5, 0.24]]
    velocity: 76
    articulation: staccato
    humanize_ms: 1
    humanize_velocity_pct: 2

  rubber_bass_pops:
    kind: bassline
    instrument: rubber_bass
    octave: 2
    pattern: [[0, 1.5, 0.18], [7, 2.25, 0.14], [12, 3.5, 0.18]]
    velocity: 44
    articulation: pluck
    humanize_ms: 2
    humanize_velocity_pct: 3

  lead_dash_hook:
    kind: motif
    instruments: [square_dash, saw_edge]
    motif: dash_hook
    root: E5
    every_bars: 4
    repeats: 8
    starts: [[0, 0.0]]
    velocity: 90
    articulation: staccato
    gate: 0.68
    instrument_velocity_offsets: {square_dash: 0, saw_edge: -16}
    instrument_octave_offsets: {square_dash: 0, saw_edge: -1}
    humanize_ms: 1
    humanize_velocity_pct: 2

  lead_taunt_reply:
    kind: motif
    instruments: [calliope_taunt, square_dash]
    motif: taunt_reply
    root: B4
    every_bars: 4
    repeats: 8
    starts: [[2, 0.0]]
    velocity: 72
    articulation: staccato
    gate: 0.60
    instrument_velocity_offsets: {calliope_taunt: 0, square_dash: -14}
    instrument_octave_offsets: {calliope_taunt: 0, square_dash: 1}
    humanize_ms: 1
    humanize_velocity_pct: 2

  ring_arps:
    kind: arpeggio
    instruments: [ring_bell, ring_sparkle]
    instrument_velocity_offsets: {ring_bell: 0, ring_sparkle: -16}
    instrument_octave_offsets: {ring_bell: 0, ring_sparkle: 1}
    octave: 5
    pattern: [0, 2, 3, 2]
    step: 0.5
    duration_beats: 0.10
    velocity: 46
    density: 0.42
    articulation: bell
    humanize_ms: 0
    humanize_velocity_pct: 2

  ring_turnaround:
    kind: motif
    instruments: [ring_bell, ring_sparkle]
    motif: sparkle_turn
    root: E6
    every_bars: 8
    repeats: 4
    starts: [[7, 3.0]]
    velocity: 56
    articulation: bell
    instrument_velocity_offsets: {ring_bell: 0, ring_sparkle: -14}
    instrument_octave_offsets: {ring_bell: 0, ring_sparkle: 1}
    humanize_ms: 0
    humanize_velocity_pct: 2

  spring_hits:
    kind: chord_hits
    instruments: [spring_brass, spring_echo]
    instrument_octave_offsets: {spring_brass: 0, spring_echo: 1}
    instrument_velocity_offsets: {spring_brass: 0, spring_echo: -18}
    hits: [[8, 3.5], [12, 3.5], [15, 3.0]]
    octave: 3
    velocity: 78
    duration_beats: 0.30
    articulation: hit
    voicing: open
    humanize_ms: 2
    humanize_velocity_pct: 3

  dash_drums_full:
    kind: drums
    instrument: speed_kit
    humanize_ms: 1
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 0.75, 1.5, 2.0, 2.75, 3.5],            velocity: 70}
      - {drum: electric_snare, beats: [1.0, 3.0],                                 velocity: 54}
      - {drum: hand_clap,      beats: [1.0, 3.0],                                 velocity: 26}
      - {drum: closed_hat,     beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5],   velocity: 26}
      - {drum: open_hat,       beats: [1.75, 3.75],                               velocity: 16}
      - {drum: shaker,         beats: [0.25, 0.75, 1.25, 1.75, 2.25, 2.75, 3.25, 3.75], velocity: 15}

playback:
  mode: section_stem_matrix
  loop_components: [main_loop]
  exit_policy:
    request_outro: stop_at_next_valid_exit_bar
    bridge_stems: [lead, bass]
    fade_stems: []

state_map:
  default:
    section: main_loop
    stems: {bass: 0.96, percussion: 0.82, lead: 1.0, rings: 0.78, springs: 0.55}

  exploring:
    preferred_section: main_loop
    stems: {bass: 0.90, percussion: 0.70, lead: 0.88, rings: 0.62, springs: 0.25}

  fast:
    preferred_section: main_loop
    stems: {bass: 0.96, percussion: 0.78, lead: 0.96, rings: 0.72, springs: 0.42}

  loop:
    preferred_section: main_loop
    stems: {bass: 1.0, percussion: 0.82, lead: 1.0, rings: 0.82, springs: 0.62}

  boost:
    preferred_section: main_loop
    stems: {bass: 1.0, percussion: 0.86, lead: 1.0, rings: 0.88, springs: 0.72}

sections:
  - id: main_loop
    kind: loop_component
    label: speed lane - seamless sprint loop
    bars: 16
    intensity: 0.86
    density: 0.76
    loopable: true
    valid_exit_local_bars: [8, 16]
    harmony: [E, B, A, B, E, B, A, B, E, B, A, B, E, B, A, B]
    layers:
      - {template: bass_momentum, velocity: 76}
      - {template: rubber_bass_pops, velocity: 44}
      - {template: lead_dash_hook, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], repeats: 1, velocity: 90}
      - {template: lead_taunt_reply, starts: [[2, 0.0], [6, 0.0], [10, 0.0], [14, 0.0]], repeats: 1, velocity: 72}
      - {template: ring_arps, density: 0.42, velocity: 46}
      - {template: ring_turnaround, starts: [[7, 3.0], [15, 3.0]], repeats: 1, velocity: 56}
      - {template: spring_hits, hits: [[8, 3.5], [12, 3.5], [15, 3.0]], velocity: 78}
      - dash_drums_full

group_postprocess:
  lead:       {gain_db: 0.8,  lowpass_hz: 13200, high_shelf_hz: 5600, high_shelf_db: 0.7, presence_low_hz: 1800, presence_high_hz: 6200, presence_db: 0.7, transient_tame: 0.02, reverb_wet: 0.002}
  bass:       {gain_db: -0.6, lowpass_hz: 9000,  high_shelf_hz: 5200, high_shelf_db: -0.2, transient_tame: 0.02, reverb_wet: 0.001}
  rings:      {gain_db: 1.0,  lowpass_hz: 13600, high_shelf_hz: 6600, high_shelf_db: 0.7, transient_tame: 0.01, reverb_wet: 0.003}
  springs:    {gain_db: 1.4,  lowpass_hz: 11800, high_shelf_hz: 5600, high_shelf_db: 0.1, transient_tame: 0.04, reverb_wet: 0.002}
  percussion: {gain_db: -2.0, lowpass_hz: 12200, high_shelf_hz: 5800, high_shelf_db: 0.0, transient_tame: 0.03, reverb_wet: 0.001}
