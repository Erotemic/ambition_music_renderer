schema: ambition.musicir.v1
id: for_emmy_forever_ago_extended
title: For Emmy, Forever Ago (Extended)
seed: 2026062117
notes: 'A longer Noether chamber-folk waltz built from the bones of for_emmy_forever_ago.  It keeps the same warm piano/guitar/horn/celesta language, but stretches it into a 128-bar emotional loop: intimate theorem, warmer answer, brighter proof, quiet return, and a loopable landing back in D. This is still meant to work as game music: one coherent loop component with stem-state weights for quiet/default/dance/bloom use.'
