schema: ambition.musicir.v1
id: scaling_laws
title: Scaling Laws - It Keeps Getting Better As It Gets Bigger
seed: 80264417
notes: >-
  A bright, awestruck cue built on ADDITIVE MINIMALISM (Glass/Reich): a small
  diatonic cell grows by a note each section while a phasing sequencer churns
  underneath, so the music itself "scales" — it is the same idea, larger. G
  Mixolydian at 112 BPM; the b7 (F) gives it a hopeful modal sheen and it stays
  fully consonant. The emotional shape is one long terraced crescendo of wonder,
  not a tension arc — each section adds a layer and climbs, and only the final
  cell reaches up to G5, once, for the awe.

  It also keeps the MODULAR FADER BOARD idea: the six stem groups are authored as
  independent ideas the game can raise or drop by situation —
    strings    = THE RUNWAY  (sub-bass + warm pad)   -- always on, the floor
    mallets    = THE ENGINE  (phasing arp + bell)    -- the additive sequencer
    percussion = THE DRIVE   (kit)                    -- enters when it ships
    winds      = THE PRODUCT  (the growing melodic cell: saw/calliope/voice)
    brass      = THE AWE      (synth-brass swells)    -- the scale becomes visible
    choir_pad  = THE VASTNESS (pad_bowed + fx_soundtrack) -- cinematic air, not dread
  Form (additive process): seed -> grow_1 -> grow_2 -> grow_3 -> bloom -> settle,
  where the melodic cell is 3 -> 5 -> 7 -> full notes and then contracts back.

tempo:
  bpm: 112
meter:
  beats_per_bar: 4
  beat_unit: 4

constraints:
  voice_leading: minimize_motion
  no_clusters: true

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi

postprocess:
  gain_db: 0.0
  highpass_hz: 30
  reverb_wet: 0.044
  reverb_decay_seconds: 1.20
  reverb_damping_hz: 7000
  stereo_width: 0.10
  compressor_threshold_db: -18.0
  compressor_ratio: 2.8
  compressor_attack_ms: 14.0
  compressor_release_ms: 130.0
  compressor_makeup_db: 1.4
  compressor_knee_db: 7.0
  limiter_drive: 0.93
  normalize: true
  target_peak_db: -2.0

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 30
  reverb_wet: 0.006
  reverb_decay_seconds: 0.55
  reverb_damping_hz: 7000
  stereo_width: 0.06
  limiter_drive: 0.92
  normalize: false
  target_peak_db: -3.0

instruments:
  - {name: pad_warm,    group: strings,    program: pad_warm,         volume: 78, pan: 64, expression: 90, modulation: 4}
  - {name: pad_poly,    group: strings,    program: pad_poly,         volume: 72, pan: 56, expression: 84, modulation: 4}
  - {name: sub_bass,    group: strings,    program: synth_bass_1,     volume: 96, pan: 64, expression: 100}

  - {name: lead_cell,   group: winds,      program: lead_saw,         volume: 90, pan: 66, expression: 100, modulation: 5}
  - {name: lead_round,  group: winds,      program: lead_calliope,    volume: 80, pan: 52, expression: 94,  modulation: 4}
  - {name: lead_voice,  group: winds,      program: lead_voice,       volume: 78, pan: 64, expression: 90,  modulation: 5}

  - {name: brass_awe_a, group: brass,      program: synth_brass_1,    volume: 86, pan: 70, expression: 98, modulation: 3}
  - {name: brass_awe_b, group: brass,      program: synth_brass_2,    volume: 80, pan: 50, expression: 94, modulation: 3}

  - {name: arp_synth,   group: mallets,    program: synth_bass_2,     volume: 86, pan: 60, expression: 96}
  - {name: bell_synth,  group: mallets,    program: fx_crystal,       volume: 70, pan: 82, expression: 84}

  - {name: pad_bowed,   group: choir_pad,  program: pad_bowed,        volume: 62, pan: 64, expression: 82, modulation: 4}
  - {name: soundtrack,  group: choir_pad,  program: fx_soundtrack,    volume: 52, pan: 64, expression: 76, modulation: 4}

  - {name: kit,         group: percussion, is_drum: true,             volume: 98, pan: 64, expression: 106}

motifs:
  # The cell, at four stages of growth (G Mixolydian, additive process).
  # 3 notes: G4 B4 D5
  - id: cell_3
    root: G4
    intervals: [0, 4, 7]
    rhythm:    [0.5, 0.5, 1.0]
    velocities: [0.92, 0.86, 0.90]

  # 5 notes: G4 B4 D5 E5 D5
  - id: cell_5
    root: G4
    intervals: [0, 4, 7, 9, 7]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 1.0]
    velocities: [0.92, 0.84, 0.90, 0.94, 0.88]

  # 7 notes: G4 B4 D5 E5 D5 B4 A4
  - id: cell_7
    root: G4
    intervals: [0, 4, 7, 9, 7, 4, 2]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
    velocities: [0.92, 0.84, 0.90, 0.94, 0.86, 0.88, 0.84]

  # Full cell: reaches G5 once at the apex. G4 B4 D5 E5 G5 E5 D5 B4 A4 G4
  - id: cell_full
    root: G4
    intervals: [0, 4, 7, 9, 12, 9, 7, 4, 2, 0]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 1.0, 0.5, 0.5, 0.5, 0.5, 1.0]
    velocities: [0.92, 0.84, 0.90, 0.94, 1.00, 0.92, 0.88, 0.84, 0.86, 0.90]

  # The awe fanfare (brass) — a broad ascending G arpeggio to G5.
  # G4 B4 D5 G5
  - id: awe_fanfare
    root: G4
    intervals: [0, 4, 7, 12]
    rhythm:    [0.5, 0.5, 0.5, 1.5]
    velocities: [0.86, 0.88, 0.92, 1.00]

  # Runway sub-bass — G pedal with a fifth lift. G1 G1 D2 G1
  - id: sub_pulse
    root: G1
    intervals: [0, 0, 7, 0]
    rhythm:    [1.0, 1.0, 1.0, 1.0]
    velocities: [1.00, 0.84, 0.90, 0.86]

layer_templates:
  expression_swell:
    kind: automation
    automation:
      - {group: winds,     cc: expression, from: 70, to: 106, curve: smooth, points: 16}
      - {group: brass,     cc: expression, from: 56, to: 102, curve: smooth, points: 16}
      - {group: strings,   cc: expression, from: 70, to: 100, curve: smooth, points: 16}
      - {group: mallets,   cc: expression, from: 70, to: 104, curve: smooth, points: 16}
      - {group: choir_pad, cc: expression, from: 54, to: 86,  curve: smooth, points: 12}

  sub_voice:
    kind: motif
    instrument: sub_bass
    motif: sub_pulse
    velocity: 90
    articulation: tenuto
    humanize_ms: 1
    humanize_velocity_pct: 3
    starts: [[0, 0.0]]
    repeats: 24
    every_bars: 1

  # The phasing engine — pattern LENGTH grows per section (additive process).
  arp_seed:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 1, 2]
    step: 0.25
    duration_beats: 0.22
    velocity: 74
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 2

  arp_grow1:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 1, 2, 3, 2]
    step: 0.25
    duration_beats: 0.22
    velocity: 76
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 2

  arp_grow2:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 1, 2, 3, 4, 3, 2]
    step: 0.25
    duration_beats: 0.22
    velocity: 78
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 2

  arp_full:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 1, 2, 3, 4, 3, 2, 1]
    step: 0.25
    duration_beats: 0.22
    velocity: 80
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 2

  warm_pad:
    kind: pad_chords
    instruments: [pad_warm, pad_poly]
    instrument_octave_offsets: {pad_warm: 0, pad_poly: 1}
    instrument_velocity_offsets: {pad_warm: 0, pad_poly: -8}
    octave: 3
    duration_beats: 4.0
    velocity: 64
    articulation: pad
    voicing: open
    humanize_ms: 4
    humanize_velocity_pct: 3

  cell3_voice:
    kind: motif
    instrument: lead_cell
    motif: cell_3
    velocity: 84
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  cell5_voice:
    kind: motif
    instrument: lead_cell
    motif: cell_5
    velocity: 86
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  cell7_voice:
    kind: motif
    instrument: lead_cell
    motif: cell_7
    velocity: 88
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  cellfull_voice:
    kind: motif
    instrument: lead_cell
    motif: cell_full
    velocity: 92
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  # A round counter-voice doubling the cell (calliope), softer.
  cell_round:
    kind: motif
    instrument: lead_round
    motif: cell_7
    transpose: -12
    velocity: 76
    articulation: legato
    humanize_ms: 3
    humanize_velocity_pct: 3

  awe_voice:
    kind: motif
    instruments: [brass_awe_a, brass_awe_b]
    instrument_octave_offsets: {brass_awe_a: 0, brass_awe_b: -1}
    motif: awe_fanfare
    velocity: 82
    articulation: marcato
    humanize_ms: 2
    humanize_velocity_pct: 3

  awe_pad:
    kind: pad_chords
    instruments: [brass_awe_a, brass_awe_b]
    instrument_octave_offsets: {brass_awe_a: 0, brass_awe_b: -1}
    octave: 3
    every_bars: 2
    duration_beats: 8.0
    velocity: 64
    articulation: legato
    voicing: open
    humanize_ms: 4
    humanize_velocity_pct: 3

  bell_sparkle:
    kind: chord_hits
    instrument: bell_synth
    octave: 5
    velocity: 70
    duration_beats: 4.0
    articulation: bell
    voicing: open
    humanize_ms: 0
    humanize_velocity_pct: 3

  bowed_wash:
    kind: pad_chords
    instrument: pad_bowed
    octave: 4
    every_bars: 4
    duration_beats: 16.0
    velocity: 56
    articulation: pad
    voicing: open
    humanize_ms: 0
    humanize_velocity_pct: 3

  soundtrack_wash:
    kind: pad_chords
    instrument: soundtrack
    octave: 3
    every_bars: 4
    duration_beats: 16.0
    velocity: 44
    articulation: pad
    voicing: wide
    humanize_ms: 0
    humanize_velocity_pct: 3

  drums_ship:
    kind: drums
    instrument: kit
    humanize_ms: 0
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 2.0],                       velocity: 86}
      - {drum: electric_snare, beats: [1.0, 3.0],                       velocity: 72}
      - {drum: closed_hat,     beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5], velocity: 28}

  drums_bloom:
    kind: drums
    instrument: kit
    humanize_ms: 0
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 1.0, 2.0, 3.0],             velocity: 90}
      - {drum: electric_snare, beats: [1.0, 3.0],                       velocity: 80}
      - {drum: hand_clap,      beats: [1.0, 3.0],                       velocity: 46}
      - {drum: closed_hat,     beats: [0.5, 1.5, 2.5, 3.5],             velocity: 36}
      - {drum: ride,           beats: [0.0, 1.0, 2.0, 3.0],             velocity: 20}
      - {drum: crash,          beat: 0.0, velocity: 80, bars: [0, 4]}

playback:
  mode: section_stem_matrix
  intro: seed
  loop_components: [grow_1, grow_2, grow_3, bloom]
  outro: settle
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [strings, mallets]
    fade_stems: [winds, brass, percussion, choir_pad]

state_map:
  starting: {section: seed}

  # Minimal: runway + engine only (the seed cell ticking).
  exploring:
    preferred_section: grow_1
    stems: {strings: 1.0, mallets: 0.90, percussion: 0.50, winds: 0.45, brass: 0.0, choir_pad: 0.55}

  # The product cell grows, drive enters.
  hacking:
    preferred_section: grow_2
    stems: {strings: 1.0, mallets: 1.0, percussion: 0.80, winds: 0.80, brass: 0.0, choir_pad: 0.55}

  # The awe becomes visible — brass swells in, register climbs.
  ambushed:
    preferred_section: grow_3
    stems: {strings: 1.0, mallets: 0.95, percussion: 0.70, winds: 0.85, brass: 0.55, choir_pad: 0.75}

  # Bloom: every fader up.
  confrontation:
    preferred_section: bloom
    stems: {strings: 1.0, mallets: 1.0, percussion: 1.0, winds: 1.0, brass: 1.0, choir_pad: 0.60}

  retreating:
    transition: outro_at_next_valid_exit_bar
    outro: settle

sections:
  - id: seed
    kind: intro
    label: seed - a 3-note cell, runway and engine only
    bars: 4
    intensity: 0.54
    density: 0.46
    loopable: false
    harmony: ["G", "G", "F", "C"]
    layers:
      - expression_swell
      - {template: arp_seed, density: 1.0, velocity: 70}
      - {template: sub_voice, repeats: 4, velocity: 84}
      - {template: warm_pad, velocity: 58}
      - {template: bowed_wash, velocity: 48}
      - {template: soundtrack_wash, velocity: 38}
      - {template: bell_sparkle, hits: [[0, 0.0]], velocity: 60}

  - id: grow_1
    kind: loop_component
    label: grow - the cell is 5 notes now, pad and lead enter
    bars: 8
    intensity: 0.66
    density: 0.60
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["G", "F", "C", "G", "Am", "C", "D", "G"]
    layers:
      - {template: cell5_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 86}
      - {template: arp_grow1, density: 1.0, velocity: 76}
      - {template: sub_voice, repeats: 8, velocity: 88}
      - {template: warm_pad, velocity: 62}
      - {template: bowed_wash, velocity: 52}
      - {template: soundtrack_wash, velocity: 40}
      - {template: bell_sparkle, hits: [[0, 0.0], [4, 0.0]], velocity: 62}

  - id: grow_2
    kind: loop_component
    label: grow - the cell is 7 notes, the drive ships
    bars: 8
    intensity: 0.76
    density: 0.70
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["G", "C", "D", "G", "F", "C", "G", "D"]
    layers:
      - {template: cell7_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 88}
      - {template: arp_grow2, density: 1.0, velocity: 78}
      - {template: sub_voice, repeats: 8, velocity: 90}
      - {template: warm_pad, velocity: 64}
      - drums_ship
      - {template: bowed_wash, velocity: 54}
      - {template: soundtrack_wash, velocity: 42}
      - {template: bell_sparkle, hits: [[0, 0.0], [4, 0.0]], velocity: 64}

  - id: grow_3
    kind: loop_component
    label: grow - the awe becomes visible, brass swells, register climbs
    bars: 8
    intensity: 0.82
    density: 0.76
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["G", "F", "C", "D", "Em", "C", "G", "D"]
    layers:
      - {template: cell7_voice, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 90}
      - {template: cell_round, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 76}
      - {template: arp_grow2, density: 1.0, velocity: 80}
      - {template: sub_voice, repeats: 8, velocity: 90}
      - {template: warm_pad, velocity: 66}
      - {template: awe_pad, velocity: 60}
      - drums_ship
      - {template: bowed_wash, velocity: 56}
      - {template: soundtrack_wash, velocity: 44}
      - {template: bell_sparkle, hits: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 66}

  - id: bloom
    kind: loop_component
    label: bloom - the full cell, every fader up, the awe
    bars: 8
    intensity: 0.92
    density: 0.86
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["G", "C", "D", "G", "Em", "C", "F", "G"]
    postprocess:
      reverb_wet: 0.060
      reverb_decay_seconds: 1.50
    layers:
      - {template: cellfull_voice, starts: [[0, 0.0], [4, 0.0]], velocity: 92}
      - {template: cell7_voice, starts: [[2, 0.0], [6, 0.0]], velocity: 82}
      - {template: cell_round, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 78}
      - {template: arp_full, density: 1.0, velocity: 82}
      - {template: sub_voice, repeats: 8, velocity: 92}
      - {template: warm_pad, velocity: 68}
      - {template: awe_pad, velocity: 66}
      - {template: awe_voice, starts: [[1, 0.0], [3, 0.0], [5, 0.0], [7, 0.0]], velocity: 82}
      - drums_bloom
      - {template: bell_sparkle, hits: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 70}
      - {template: bowed_wash, velocity: 56}
      - {template: soundtrack_wash, velocity: 44}

  - id: settle
    kind: outro
    label: settle - the process contracts back to the seed, resting on G
    bars: 4
    intensity: 0.62
    density: 0.50
    loopable: false
    harmony: ["C", "D", "G", "G"]
    layers:
      - {template: cell3_voice, starts: [[0, 0.0], [2, 0.0]], velocity: 82}
      - {template: arp_grow1, density: 0.85, velocity: 70}
      - {template: sub_voice, repeats: 4, velocity: 84}
      - {template: warm_pad, velocity: 60}
      - {template: awe_pad, velocity: 56}
      - kind: drums
        instrument: kit
        humanize_ms: 0
        events:
          - {drum: kick, beat: 0.0, velocity: 86, bars: [3]}
          - {drum: crash, beat: 0.0, velocity: 78, bars: [3]}
      - {template: bell_sparkle, hits: [[2, 0.0], [3, 0.0]], velocity: 66}
      - {template: bowed_wash, velocity: 50}
      - {template: soundtrack_wash, velocity: 40}

group_postprocess:
  strings:    {gain_db: 0.0,  lowpass_hz: 13500, high_shelf_hz: 5400, high_shelf_db: 0.4, transient_tame: 0.04, reverb_wet: 0.005}
  winds:      {gain_db: 0.5,  lowpass_hz: 14000, high_shelf_hz: 5200, high_shelf_db: 0.8, presence_low_hz: 1500, presence_high_hz: 5400, presence_db: 0.8, transient_tame: 0.02, reverb_wet: 0.006}
  brass:      {gain_db: 0.0,  lowpass_hz: 12500, high_shelf_hz: 5200, high_shelf_db: 0.4, transient_tame: 0.04, reverb_wet: 0.006}
  mallets:    {gain_db: 0.0,  lowpass_hz: 13500, high_shelf_hz: 5600, high_shelf_db: 0.5, transient_tame: 0.03, reverb_wet: 0.006}
  percussion: {gain_db: -1.0, lowpass_hz: 11500, high_shelf_hz: 5400, high_shelf_db: 0.0, transient_tame: 0.04, reverb_wet: 0.003}
  choir_pad:  {gain_db: -2.0, lowpass_hz: 11500, high_shelf_hz: 5400, high_shelf_db: -0.2, transient_tame: 0.04, reverb_wet: 0.014}
