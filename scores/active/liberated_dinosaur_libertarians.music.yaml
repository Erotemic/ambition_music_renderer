  - {name: clean_guitar, group: guitars, program: clean_guitar, volume: 58, pan: 38, expression: 72}
  - {name: overdrive_guitar, group: guitars, program: overdrive_guitar, volume: 58, pan: 78, expression: 72}
  - {name: organ, group: keys, program: drawbar_organ, volume: 54, pan: 56, expression: 70}
  - {name: bass, group: bass, program: picked_bass, volume: 68, pan: 46, expression: 84}
  - {name: drums, group: percussion, is_drum: true, volume: 60, pan: 64, expression: 88}
motifs:
