schema: ambition.musicir.v1
id: liberated_dinosaur_libertarians
title: Liberated Dinosaur Stomp - Libertarian Faction Theme
seed: 2026051004
notes: >-
  Libertarian faction loop using the liberated dinosaur idea: a loose southern
  rock freedom anthem with fiddle, guitars, organ, and a big stomp. It nods to
  the existing dinosaur liberators cue but is a compact active-loop variant.
tempo:
  bpm: 110
meter:
