  beat_unit: 4
render:
  sample_rate: 48000
  ogg_quality: 5
  backend: fallback
constraints:
  voice_leading: minimize_motion
  no_clusters: true
postprocess:
  gain_db: -0.5
  highpass_hz: 34
  lowpass_hz: 10000
  presence_low_hz: 1600
  presence_high_hz: 4600
  presence_db: 0.8
  reverb_wet: 0.10
  reverb_decay_seconds: 1.0
  reverb_damping_hz: 5200
  stereo_width: 0.13
  compressor_threshold_db: -16.0
  compressor_ratio: 3.4
  compressor_attack_ms: 7.0
  compressor_release_ms: 95.0
  compressor_makeup_db: 1.3
  compressor_knee_db: 5.0
  limiter_drive: 1.05
  normalize: true
  target_peak_db: -6.5
stem_postprocess:
