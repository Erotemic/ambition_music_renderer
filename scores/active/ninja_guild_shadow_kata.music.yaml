schema: ambition.musicir.v1
id: ninja_guild_shadow_kata
title: Shadow Kata - Ninja Guild Theme
seed: 2026050922
notes: >-
  Revised Ninja Guild faction loop. This version avoids the broad Chinese
  pentatonic flavor and leans into Japanese in-sen / hirajoshi color:
  shakuhachi breath tones with scoops, koto punctuation, dry shamisen cuts,
  noh-like negative space, woodblock time, and restrained taiko accents.
tempo:
  bpm: 92
meter:
  beats_per_bar: 4
  beat_unit: 4
render:
  sample_rate: 48000
  ogg_quality: 5
  backend: fallback
constraints:
  voice_leading: minimize_motion
  no_clusters: true
postprocess:
  gain_db: -1.1
  highpass_hz: 34
  lowpass_hz: 8600
  high_shelf_hz: 5100
  high_shelf_db: -2.1
  reverb_wet: 0.14
  reverb_decay_seconds: 1.55
  reverb_damping_hz: 3900
  stereo_width: 0.14
  compressor_threshold_db: -19.5
  compressor_ratio: 2.4
  compressor_attack_ms: 12.0
  compressor_release_ms: 95.0
  compressor_makeup_db: 0.6
  compressor_knee_db: 6.0
  limiter_drive: 0.92
  normalize: true
  target_peak_db: -7.8
stem_postprocess:
