  loop_components: [enforcer_loop]
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [brass, bass]
    fade_stems: [strings, choir_pad, mallets, percussion]
state_map:
