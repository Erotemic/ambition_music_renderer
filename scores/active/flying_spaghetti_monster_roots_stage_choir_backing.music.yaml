schema: ambition.musicir.v1
id: flying_spaghetti_monster_roots_stage_choir_backing
title: One Love, One Noodle - Continuous Monk Choir Stage
seed: 2026060413
notes: Stage/non-boss variant derived from the roots-reggae Flying Spaghetti Monster cue after the r12
  boss chorale pass. Keeps the calmer Bob Marley / roots-reggae pocket, one-drop percussion, muted skank
  guitar, warm keys, and light jam guitar; replaces the older intermittent plainchant/response layers
  with a continuous low monk chorale that follows the A/D/E/Bm harmony by root/fifth tones. The choir
  is meant to add a holy Gregorian floor without becoming a lead melody, with no intentional rests and
  explicit gate=1.0 to avoid same-pitch MIDI note-off dropouts.
