schema: ambition.musicir.v1
id: flying_spaghetti_monster_roots_stage_choir_backing
title: One Love, One Noodle - Pastafarian Mob Stage
seed: 2026060413
notes: 'Stage/non-boss roots-reggae battle cue. Keeps the relaxed one-drop pocket, muted skank, warm keys, dub bass, melodica
  color, sparse mob chants, and the boss-derived production polish. The former overdrive/steel lead guitar arrangement has
  been completely replaced: a warm tenor sax now carries the two featured interludes, while a clean jazz guitar contributes
  short pentatonic turnarounds and replies throughout the loop. Both guitar roles are now mixed at an intentionally audible
  reference level: the skank provides a clear rhythmic bed and the clean guitar remains noodly without returning as the harsh bent lead around 0:40.'
