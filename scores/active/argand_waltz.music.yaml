schema: ambition.musicir.v1
id: argand_waltz
title: "The Argand Waltz \u2014 a turn through the complex plane"
seed: 20260624
notes: 'Sweet violin waltz inspired by complex numbers: the waltz is rotation (Euler
  e^{i theta}); solo violin = real part, cello = imaginary part a quarter-turn out
  of phase; the theme is a palindrome (conjugate symmetry); the harp winds the unit
  circle; the bridge floats the three cube roots of unity (D-F#-Bb).'
tempo:
  bpm: 88
meter:
  beats_per_bar: 3
  beat_unit: 4
constraints:
  voice_leading: minimize_motion
  no_clusters: true
render:
  sample_rate: 48000
  ogg_quality: 6
  soundfont: /usr/share/sounds/sf2/FluidR3_GM.sf2
  sfizz:
    library_roots:
    - /data/audio-tools/sfz
    - /data/audio-tools
    fallback_backend: pretty-midi
postprocess:
  gain_db: 0.0
  highpass_hz: 34
  lowpass_hz: 11000
  high_shelf_hz: 7000
  high_shelf_db: -1.2
  eq_bands:
  - type: low_shelf
    hz: 110
    q: 0.8
    db: 1.0
  - type: peak
    hz: 330
    q: 0.9
    db: -1.4
  - type: peak
    hz: 2600
    q: 1.1
    db: -1.2
  reverb_wet: 0.16
  reverb_decay_seconds: 2.0
  reverb_damping_hz: 4200
  stereo_width: 0.22
  compressor_threshold_db: -18
  compressor_ratio: 1.4
  compressor_attack_ms: 24
  compressor_release_ms: 180
  limiter_drive: 0.7
  normalize: true
  target_peak_db: -2.0
