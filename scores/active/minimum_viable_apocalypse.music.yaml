schema: ambition.musicir.v1
id: minimum_viable_apocalypse
title: Minimum Viable Apocalypse
seed: 2026062032
notes: 'Rewritten as slow 6/8 industrial sludge-funk: low organ, doom bass, tom ritual, sparse guitar. It avoids
  the prior sprint-punk arc; the emotion is heavy, procedural, and exhausted.'
