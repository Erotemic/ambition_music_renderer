title: Oppressive Crush - Authoritarian Faction Theme
seed: 2026051005
notes: >-
  Authoritarian faction loop. A heavy, grinding state-machine march: low brass,
  contrabass, timpani, metallic hits, and a short hook that feels memorable but
  coercive. The meter presses forward like boots and factory pistons.
