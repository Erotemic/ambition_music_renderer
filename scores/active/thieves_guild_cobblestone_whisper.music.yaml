title: Cobblestone Whisper - Thieves Guild Theme
seed: 2026050914
notes: >-
  Thieves Guild faction loop. Nimble 7/8 stealth-jazz: pizzicato strings,
  muted trumpet hints, clarinet alley-calls, brushed side-stick, and a hook
  that keeps slipping one beat early. Memorable by contour, but never quite
  stands under the streetlamp.
