schema: ambition.musicir.v1
id: argand_overdrive
title: "Argand Overdrive \u2014 the complex plane, distorted"
seed: 20260624
notes: 'Heavy-rock sibling of The Argand Waltz: a driving 3/4 metal waltz (rotation
  = Euler e^{i theta}) on the same D-major palindrome theme, real/imaginary two-voice
  interplay, and cube-roots-of-unity bridge (D-F#-Bb). Distorted power chords + rock
  kit + bass under a Sonatina violin lead and symphonic strings. TODO: vary the strum/power-chord
  velocities more (humanize + an accent pattern) so the rhythm guitars feel less mechanical.'
tempo:
  bpm: 150
meter:
  beats_per_bar: 3
  beat_unit: 4
constraints:
  voice_leading: minimize_motion
  no_clusters: true
render:
  sample_rate: 48000
  ogg_quality: 6
  soundfont: /usr/share/sounds/sf2/FluidR3_GM.sf2
  runtime_stems:
    max_gain_db: 26.0
  sfizz:
    library_roots:
    - /data/audio-tools/sfz
    - /data/audio-tools
    fallback_backend: pretty-midi
postprocess:
