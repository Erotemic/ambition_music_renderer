    q: 0.7
    db: -1.0
  reverb_wet: 0.07
  reverb_decay_seconds: 1.4
  stereo_width: 0.2
  compressor_threshold_db: -16
  compressor_ratio: 2.2
  compressor_attack_ms: 14
  compressor_release_ms: 140
  compressor_makeup_db: 1.0
  limiter_drive: 0.9
  normalize: true
  target_peak_db: -1.5
