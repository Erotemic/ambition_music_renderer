schema: ambition.musicir.v1
id: mathematicians_guild_proof_by_moonlight
title: Proof by Moonlight - Mathematicians Guild Theme
seed: 2026050915
notes: >-
  Mathematicians Guild faction loop. Clear, contrapuntal 5/4 chamber music:
  marimba permutations, celesta theorem sparks, clarinet lemma, and a palindrome
  phrase that resolves only after the second statement. Precise but warm.
