  highpass_hz: 30
  lowpass_hz: 11600
  presence_low_hz: 1800
  presence_high_hz: 4200
  presence_db: 0.4
  reverb_wet: 0.15
  reverb_decay_seconds: 1.55
  reverb_damping_hz: 5700
  stereo_width: 0.16
  compressor_threshold_db: -18.0
  compressor_ratio: 2.5
  compressor_attack_ms: 12.0
  compressor_release_ms: 100.0
  compressor_makeup_db: 0.8
  compressor_knee_db: 6.0
