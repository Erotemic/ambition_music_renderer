playback:
  mode: section_stem_matrix
  intro: beyond_the_light_cone
  loop_components: [blue_shift, umbra, light_cone_break, superluminal, afterimage]
  outro: return_to_light
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [atmosphere, pulse, bass]
    fade_stems: [impacts]

state_map:
  default:
    preferred_section: blue_shift
    stems: {pulse: 0.92, bass: 0.96, atmosphere: 0.78, lead: 0.88, shadow: 0.72, signal: 0.42, impacts: 0.35, percussion: 0.82}
  exploring:
    preferred_section: umbra
    stems: {pulse: 0.78, bass: 0.88, atmosphere: 0.96, lead: 0.70, shadow: 0.90, signal: 0.46, impacts: 0.18, percussion: 0.60}
  fast:
    preferred_section: light_cone_break
    stems: {pulse: 0.98, bass: 1.0, atmosphere: 0.72, lead: 0.96, shadow: 0.68, signal: 0.52, impacts: 0.56, percussion: 0.94}
  boost:
    preferred_section: superluminal
    stems: {pulse: 1.0, bass: 1.0, atmosphere: 0.74, lead: 1.0, shadow: 0.82, signal: 0.60, impacts: 0.78, percussion: 1.0}
  aftermath:
    preferred_section: afterimage
    stems: {pulse: 0.74, bass: 0.84, atmosphere: 0.94, lead: 0.66, shadow: 0.88, signal: 0.54, impacts: 0.14, percussion: 0.52}
  leaving:
    transition: outro_at_next_valid_exit_bar
    outro: return_to_light

sections:
  - id: beyond_the_light_cone
    kind: intro
    label: acceleration before perception fails
    bars: 8
    intensity: 1.00
    density: 0.54
    loopable: false
    harmony: [Bm(add9), Gmaj7(#11), D6/A, A(add9), Bm(add9), Em9, Gmaj7, F#7sus4]
    layers:
      - intro_rise
      - {template: dark_pad, velocity: 58}
      - {template: pulse_sequence_sparse, density: 0.66, velocity: 53}
      - {template: velocity_bass, velocity: 80}
      - {template: bass_afterimage, velocity: 56}
      - {template: threshold_lead, starts: [[4, 0.0]], velocity: 60}
      - {template: signal_glint, starts: [[7, 0.0]], velocity: 38}
      - {template: breakbeat_light}

  - id: blue_shift
    kind: loop_component
    label: motion becomes color
    bars: 16
    intensity: 0.82
    density: 0.74
    loopable: true
    valid_exit_local_bars: [8, 16]
    harmony:
      - Bm(add9)
      - Gmaj7(#11)
      - D6/A
      - A(add9)
      - Em9
      - Gmaj7/B
      - Dmaj9
      - F#7sus4
      - Bm(add9)
      - Gmaj7
      - D6/A
      - A(add9)
      - Em9
      - Gmaj7
      - A6
      - F#7sus4
    layers:
      - {template: dark_pad, velocity: 45}
