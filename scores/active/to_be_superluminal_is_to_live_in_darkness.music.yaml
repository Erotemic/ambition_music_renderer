schema: ambition.musicir.v1
id: to_be_superluminal_is_to_live_in_darkness
title: To Be Superluminal Is to Live in Darkness
seed: 2026071201
notes: >-
  A long-form Sanic level cue about outrunning the light cone and discovering
  that speed beyond perception is not brightness but isolation. This is not a
  variation on You Are Too Slow: it uses a darker B-minor center, interlocking
  3+3+2 motion, restrained low choir and strings, a human/synthetic lead pair,
  and five adaptive loop movements that develop one thematic idea instead of
  repeating a single taunt.

  The main four-beat call climbs B-D-F#-A-B but folds back through G and E; the
  melodic horizon is visible but never inhabited. A lower answer and a two-bar
  umbra theme gradually recombine in the superluminal section. The highest
  foreground pitch is B5, and background generators are kept below D6 so speed
  reads as detail and counterpoint rather than whistle-register glare.

  The 88-bar authored form lasts roughly 132 seconds at 160 BPM. The intro
  establishes a credible headphone reference level in its first bar; its sense
  of acceleration comes from density and orchestration rather than near-silence.
  Every loop component ends on dominant tension or compatible common tones, and
  the afterimage/outro both return naturally to B minor without a power-down
  collapse.

tempo:
  bpm: 160

meter:
  beats_per_bar: 4
  beat_unit: 4

constraints:
  voice_leading: minimize_motion
  no_clusters: true

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi
  adaptive_section_mastering:
    mode: global_master_slices
  runtime_stems:
    target_peak_db: -10.0
    max_gain_db: 16.0

postprocess:
  gain_db: -0.7
  highpass_hz: 31
  lowpass_hz: 11600
  high_shelf_hz: 5600
  high_shelf_db: -1.2
  presence_low_hz: 1500
  presence_high_hz: 4300
  presence_db: 0.25
  transient_tame: 0.055
  transient_lowpass_hz: 8400
  reverb_wet: 0.060
  reverb_decay_seconds: 1.10
  reverb_damping_hz: 5200
  post_reverb_high_shelf_hz: 5600
  post_reverb_high_shelf_db: -0.8
  stereo_width: 0.13
  compressor_threshold_db: -18.5
  compressor_ratio: 2.05
  compressor_attack_ms: 13.0
  compressor_release_ms: 125.0
  compressor_makeup_db: 0.7
  compressor_knee_db: 6.0
  limiter_drive: 0.86
  normalize: true
  target_peak_db: -3.2

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 30
  lowpass_hz: 12000
  transient_tame: 0.035
  transient_lowpass_hz: 8800
  reverb_wet: 0.010
  reverb_decay_seconds: 0.55
  reverb_damping_hz: 5600
  stereo_width: 0.04
  limiter_drive: 0.84
  normalize: false
  target_peak_db: -3.0

