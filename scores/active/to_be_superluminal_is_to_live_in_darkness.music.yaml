      - {group: pulse,      cc: expression, from: 78, to: 82, curve: smooth, points: 16}
      - {group: bass,       cc: expression, from: 88, to: 92, curve: smooth, points: 12}
      - {group: lead,       cc: expression, from: 74, to: 86, curve: smooth, points: 10}
      - {group: percussion, cc: expression, from: 84, to: 91, curve: smooth, points: 12}

