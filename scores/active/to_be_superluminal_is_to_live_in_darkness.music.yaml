  - {name: pulse_glass,      group: pulse,      program: electric_piano_2,  volume: 54, pan: 80, expression: 70, chorus: 7, reverb: 14}
  - {name: sub_drive,        group: bass,       program: synth_bass_1,      volume: 84, pan: 59, expression: 92}
  - {name: bass_shadow,      group: bass,       program: fingered_bass,     volume: 49, pan: 68, expression: 68}
  - {name: night_strings,    group: atmosphere, program: pad_bowed,         volume: 59, pan: 52, expression: 76, modulation: 7, reverb: 24}
  - {name: black_chorus,     group: atmosphere, program: voice_oohs,        volume: 42, pan: 72, expression: 60, reverb: 28}
  - {name: dark_lead,        group: lead,       program: lead_basslead,     volume: 76, pan: 55, expression: 86, modulation: 2}
  - {name: light_shadow,     group: lead,       program: lead_square,       volume: 45, pan: 78, expression: 60, modulation: 1}
  - {name: cello_trace,      group: shadow,     program: cello,             volume: 62, pan: 43, expression: 74, modulation: 4, reverb: 18}
  - {name: signal_vibe,      group: signal,     program: vibraphone,        volume: 49, pan: 86, expression: 62, reverb: 22}
  - {name: impact_brass,     group: impacts,    program: synth_brass_2,     volume: 69, pan: 52, expression: 76, reverb: 10}
  - {name: speed_kit,        group: percussion, is_drum: true,              volume: 79, pan: 64, expression: 91}

