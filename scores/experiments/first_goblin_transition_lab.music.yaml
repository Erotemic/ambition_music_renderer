schema: ambition.musicir.v1
id: first_goblin_transition_lab
title: First Goblin Transition Lab - Intro to Wave1
seed: 42024093
notes: 'Derived from first_goblin_tune_v2.


  Clean demo revision of first_goblin_tune_v2.  This version deliberately simplifies the adaptive arrangement
  so the demo checks the important boxes: intro, loopable waves, outro, six stems, a clear wave-2 intensity
  lift, and calmer percussion.  The synthetic fast-renderer score avoids noisy hats, crashes, dense string
  saw layers, and overlapping short attacks that were causing buzz/popping when stems were layered in-game.  2026-05-10
  pass: keep full-section loudness matched in the renderer and avoid noisy reverb/normalizer tails so
  runtime gains can stay near unity.


  Transition-lab derivative of first_goblin_tune_v2. This score is intentionally isolated from scores/active
  so agents can tune the intro->wave1 handoff without clobbering the in-game cue. Goals: lower intro perceived
  loudness, reduce high-frequency reverb/noise floor, make the intro feel like a pickup into wave1, front-load
  wave1 energy for the runtime crossfade, and keep generated sections runtime-crossfade friendly.'
